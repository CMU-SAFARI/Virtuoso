    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  mplru_bandit_beta_sweep:
    description: "Sweep beta (EMA smoothing): 0.1 (slow) vs 0.2 (default) vs 0.4 (fast)"
    configs: [utopia_mplru_bandit_beta_low, utopia_mplru_bandit, utopia_mplru_bandit_beta_high]
    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  mplru_bandit_probe_sweep:
    description: "Sweep probe period: 5 (fast) vs 10 (default) vs 20 (slow) epochs"
    configs: [utopia_mplru_bandit_probe_fast, utopia_mplru_bandit, utopia_mplru_bandit_probe_slow]
    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  mplru_bandit_abort_sweep:
    description: "Sweep abort threshold: 2% (tight) vs 3% (default) vs 5% (loose)"
    configs: [utopia_mplru_bandit_abort_tight, utopia_mplru_bandit, utopia_mplru_bandit_abort_loose]
    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  mplru_bandit_penalty_sweep:
    description: "Sweep penalty factor: 0.98 (mild) vs 0.95 (default) vs 0.90 (harsh)"
    configs: [utopia_mplru_bandit_penalty_mild, utopia_mplru_bandit, utopia_mplru_bandit_penalty_harsh]
    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  mplru_bandit_full_sweep:
    description: "Full bandit hyperparameter sweep (all 10 configs)"
    configs: [utopia_mplru_bandit, utopia_mplru_bandit_beta_low, utopia_mplru_bandit_beta_high, utopia_mplru_bandit_probe_fast, utopia_mplru_bandit_probe_slow, utopia_mplru_bandit_abort_tight, utopia_mplru_bandit_abort_loose, utopia_mplru_bandit_penalty_mild, utopia_mplru_bandit_penalty_harsh, utopia_mplru_bandit_fragmented]
    traces: [rnd.sift]
    instruction_count: 10000000  # 10M

  mplru_bandit_fragmented:
    description: "Test bandit controller under 50% memory fragmentation"
    configs: [utopia_mplru_disabled, utopia_mplru_fragmented, utopia_mplru_bandit_fragmented]
    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  # ============ MPLRU Bandit Controller - Google Workloads (Problematic) ============
  # Google workloads (sierra, tango, etc.) were problematic for the delta controller
  # because they have low translation share but still cause IPC degradation with MPLRU

  mplru_bandit_rnd:
    description: "Test bandit controller on Sierra workloads (Google - problematic for delta)"
    configs: [reservethp_fully_fragmented, utopia_mplru_disabled, utopia_mplru,utopia_mplru_bandit]
    traces: [rnd.sift]
    instruction_count: 10000000  #

  mplru_bandit_google_sierra:
    description: "Test bandit controller on Sierra workloads (Google - problematic for delta)"
    configs: [reservethp_fully_fragmented, utopia_mplru_disabled, utopia_mplru,utopia_mplru_bandit]
    trace_base_dir: "${CHAMPSIM_TRACES}"
    traces: [sierra.a.6/sierra.a.6_0005.champsim.gz]
    instruction_count: 50000000  # 50M

  mplru_bandit_google_tango:
