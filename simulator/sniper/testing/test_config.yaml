# Virtuoso Testing Framework Configuration
# ==========================================

# Base paths
paths:
  sniper_root: "${VIRTUOSO_ROOT}/simulator/sniper"
  traces_dir: "${VIRTUOSO_TRACES}"
  configs_dir: "./config/address_translation_schemes"
  results_dir: "./results/testing"
# Default test parameters
defaults:
  instruction_count: 10000000  # 10M instructions
  max_parallel_jobs: 4
  timeout_seconds: 3600  # 1 hour

# Available configurations
# Each config can have:
#   - file: the base .cfg file
#   - extends: list of -g options to add
#   - description: human-readable description
configs:
  # Baseline systems
  baseline:
    file: "baseline.cfg"
    description: "Baseline radix page table with 4KB pages"
  
  baseline_champsim:
    file: "baseline.cfg"
    extends:
      - "traceinput/type=champsim"
    description: "Baseline radix page table for ChampSim traces"
  
  # No translation (for comparison)
  no_translation:
    file: "no_translation.cfg"
    description: "Translation disabled - VA used directly as PA"
    
  # THP-based allocators
  reservethp_fully_fragmented:
    file: "reservethp.cfg"
    extends:
      - "--perf_model/reserve_thp/target_fragmentation=0.0"
    description: "Reservation-based THP allocator"

  reservethp_mid_fragmented:
    file: "reservethp.cfg"
    extends:
      - "--perf_model/reserve_thp/target_fragmentation=0.5"
    description: "Reservation-based THP with 50% fragmentation"
    
  reservethp_no_fragmentation:
    file: "reservethp.cfg"
    extends:
      - "--perf_model/reserve_thp/target_fragmentation=1.0"
    description: "Reservation-based THP with no fragmentation"

  # L2 XOR hash configurations for reducing cache conflicts from THP
  reservethp_l2xor_no_fragmentation:
    file: "reservethp_l2xor.cfg"
    extends:
      - "--perf_model/reserve_thp/target_fragmentation=1.0"
    description: "Reservation-based THP with no fragmentation, L2 XOR hash"

  reservethp_l2xor_fully_fragmented:
    file: "reservethp_l2xor.cfg"
    extends:
      - "--perf_model/reserve_thp/target_fragmentation=0.0"
    description: "Reservation-based THP fully fragmented, L2 XOR hash"

  asap:
    file: "asap.cfg"
    description: "ASAP allocator"

  # Perfect translation (zero latency but uses same PA mapping)
  perfect:
    file: "perfect_translation.cfg"
    description: "Perfect translation - zero latency, but with PA remapping"
    
  # SPOT allocator
  spot:
    file: "spot.cfg"
    description: "SPOT contiguity-aware allocator"

  spot_fragmented:
    file: "spot.cfg"
    extends:
      - "--perf_model/spot_allocator/target_fragmentation_spot=50"
    description: "SPOT with fragmentation level 50"

  # Utopia configurations
  utopia:
    file: "utopia.cfg"
    description: "Utopia with RestSeg + FlexSeg (4-level hierarchy) and UTLB"

  utopia_baseline:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/speculation/enabled=false"
      - "--perf_model/utopia/migration_cost_topk/enabled=0"
    description: "Utopia baseline: no speculation, no migration (RadixWay + PWC only)"

  utopia_debug:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/debug=true"
    description: "Utopia with detailed debug output enabled"

  utopia_no_utlb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/utlb/enabled=false"
    description: "Utopia without UTLB (for comparison)"

  utopia_fragmented:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/target_fragmentation=0.5"
    description: "Utopia with 50% memory fragmentation"

  # ============ Utopia MPLRU (Metadata-Priority LRU) Configurations ============
  # MPLRU prioritizes translation metadata (FPA/TAR) in NUCA cache
  # meta_level: 0=vanilla LRU, 1=protect if bottom 50%, 2=always evict data, 3=way partition

  utopia_mplru:
    file: "utopia_mplru.cfg"
    description: "Utopia with MPLRU adaptive replacement policy"

  utopia_mplru_always:
    file: "utopia_mplru.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/mode=always"
    description: "Utopia with MPLRU always-on (meta_level=2)"

  utopia_mplru_disabled:
    file: "utopia_mplru.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/mode=disabled"
    description: "Utopia with MPLRU disabled (vanilla LRU baseline)"

  utopia_mplru_aggressive:
    file: "utopia_mplru.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/meta_level_start=3"
      - "--perf_model/nuca/cache/mplru/controller/meta_level_max=3"
    description: "Utopia with aggressive MPLRU (way partition)"

  utopia_mplru_conservative:
    file: "utopia_mplru.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/meta_level_start=1"
      - "--perf_model/nuca/cache/mplru/controller/meta_level_max=2"
    description: "Utopia with conservative MPLRU (protect if bottom 50%)"

  utopia_mplru_fragmented:
    file: "utopia_mplru.cfg"
    extends:
      - "--perf_model/utopia/target_fragmentation=0.5"
    description: "Utopia MPLRU with 50% memory fragmentation"

  # ============ Utopia MPLRU Bandit Controller Configurations ============
  # IPC-only multi-armed bandit for level selection (6 levels: L0-L5)
  # L0: OFF (vanilla LRU), L1: 25% bias, L2: 50% bias, L3: hard bias
  # L4: 25% partition, L5: 50% partition
  # Bandit uses Q-value EMA, periodic neighbor probing, abort guardrail

  # Default bandit configuration
  utopia_mplru_bandit:
    file: "utopia_mplru_bandit.cfg"
    description: "Utopia with MPLRU bandit controller (IPC-only, default params)"

  # Beta (EMA smoothing) sweep - controls responsiveness vs stability
  utopia_mplru_bandit_beta_low:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/beta=0.1"
    description: "Utopia MPLRU bandit with low beta=0.1 (slower adaptation)"

  utopia_mplru_bandit_beta_high:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/beta=0.4"
    description: "Utopia MPLRU bandit with high beta=0.4 (faster adaptation)"

  # Probe period sweep - how often to explore neighbors
  utopia_mplru_bandit_probe_fast:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/probe_period=5"
    description: "Utopia MPLRU bandit with fast probing (every 5 epochs)"

  utopia_mplru_bandit_probe_slow:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/probe_period=20"
    description: "Utopia MPLRU bandit with slow probing (every 20 epochs)"

  # Abort threshold sweep - sensitivity to IPC drops during probes
  utopia_mplru_bandit_abort_tight:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/abort_threshold=0.02"
    description: "Utopia MPLRU bandit with tight abort (2% IPC drop)"

  utopia_mplru_bandit_abort_loose:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/abort_threshold=0.05"
    description: "Utopia MPLRU bandit with loose abort (5% IPC drop)"

  # Penalty factor sweep - how much to penalize Q on abort
  utopia_mplru_bandit_penalty_mild:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/penalty_factor=0.98"
    description: "Utopia MPLRU bandit with mild penalty (2% on abort)"

  utopia_mplru_bandit_penalty_harsh:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/penalty_factor=0.90"
    description: "Utopia MPLRU bandit with harsh penalty (10% on abort)"

  # Fragmented memory scenario
  utopia_mplru_bandit_fragmented:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/utopia/target_fragmentation=0.5"
    description: "Utopia MPLRU bandit with 50% memory fragmentation"

  # ============ Utopia MPLRU Bandit - Hardcoded Policy Arms ============
  # Force bandit to use a specific policy (bypass learning)
  # 12 arms: M0-M5 (metadata protection), D0-D5 (data protection)
  # M0/D0 = vanilla LRU, M1-M5/D1-D5 = increasing protection levels

  utopia_bandit_force_M0:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=0"
    description: "Bandit forced to M0 (vanilla LRU - OFF)"

  utopia_bandit_force_M1:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=1"
    description: "Bandit forced to M1 (metadata 25% bias)"

  utopia_bandit_force_M2:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=2"
    description: "Bandit forced to M2 (metadata 50% bias)"

  utopia_bandit_force_M3:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=3"
    description: "Bandit forced to M3 (metadata hard bias)"

  utopia_bandit_force_M4:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=4"
    description: "Bandit forced to M4 (25% way partition for metadata)"

  utopia_bandit_force_M5:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=5"
    description: "Bandit forced to M5 (50% way partition for metadata)"

  utopia_bandit_force_D0:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=6"
    description: "Bandit forced to D0 (vanilla LRU - same as M0)"

  utopia_bandit_force_D1:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=7"
    description: "Bandit forced to D1 (data 25% bias)"

  utopia_bandit_force_D2:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=8"
    description: "Bandit forced to D2 (data 50% bias)"

  utopia_bandit_force_D3:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=9"
    description: "Bandit forced to D3 (data hard bias)"

  utopia_bandit_force_D4:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=10"
    description: "Bandit forced to D4 (25% way partition for data)"

  utopia_bandit_force_D5:
    file: "utopia_mplru_bandit.cfg"
    extends:
      - "--perf_model/nuca/cache/mplru/controller/force_policy=true"
      - "--perf_model/nuca/cache/mplru/controller/forced_policy_id=11"
    description: "Bandit forced to D5 (50% way partition for data)"

  # ============ Utopia RestSeg Size Configurations ============
  # RestSeg sizes are configured via: size (in MB), page_size (in bits), assoc
  # Default: RestSeg-0: 8192MB 2MB-pages 8-way, RestSeg-1: 8192MB 4KB-pages 16-way

  # Large RestSegs (16GB each = 32GB total for RestSeg)
  utopia_large_restsegs:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=8192,8192"
    description: "Utopia with large RestSegs (16GB 2MB + 16GB 4KB)"

  # Small RestSegs (4GB each = 8GB total for RestSeg)
  utopia_small_restsegs:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,2048"
    description: "Utopia with small RestSegs (4GB 2MB + 4GB 4KB)"

  # Tiny RestSegs (1GB each = 2GB total for RestSeg)
  utopia_tiny_restsegs:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=512,512"
    description: "Utopia with tiny RestSegs (512 2MB + 512 4KB)"


  # Large 4KB RestSeg only (4GB 2MB, 16GB 4KB)
  utopia_large_4kb_restseg:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=1024,8192"
    description: "Utopia with large 4KB RestSeg (1GB 2MB + 16GB 4KB)"

  # High associativity RestSegs
  utopia_high_assoc:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/assoc=16,32"
      - "--perf_model/utopia/restseg/size=2048,2048"
    description: "Utopia with high associativity (16-way 2MB, 32-way 4KB)"


  # ============ Utopia Policy Combinations ============
  # First Touch: 0=Optimistic, 1=Conservative, 2=Coalescing, 3=Adaptive, 4=RegionAware
  # Migration:   0=None, 1=TLBDriven, 2=AccessCount, 3=Coalescing, 4=Hybrid

  utopia_optimistic_tlb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/first_touch_policy=0"
      - "--perf_model/utopia/migration_policy=1"
    description: "Utopia: Optimistic first-touch + TLB-driven migration"

  utopia_optimistic_none:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/first_touch_policy=0"
      - "--perf_model/utopia/migration_policy=0"
    description: "Utopia: Optimistic first-touch, no migration"

  utopia_conservative_tlb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/first_touch_policy=1"
      - "--perf_model/utopia/migration_policy=1"
    description: "Utopia: Conservative first-touch + TLB-driven migration"

  utopia_conservative_hybrid:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/first_touch_policy=1"
      - "--perf_model/utopia/migration_policy=4"
    description: "Utopia: Conservative first-touch + Hybrid migration"

  utopia_coalescing_coalescing:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/first_touch_policy=2"
      - "--perf_model/utopia/migration_policy=3"
    description: "Utopia: Coalescing first-touch + Coalescing migration"

  utopia_adaptive_hybrid:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/first_touch_policy=3"
      - "--perf_model/utopia/migration_policy=4"
    description: "Utopia: Adaptive first-touch + Hybrid migration"

  utopia_regionaware_accesscount:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/first_touch_policy=4"
      - "--perf_model/utopia/migration_policy=2"
    description: "Utopia: RegionAware first-touch + AccessCount migration"

  # ============ Utopia FPA/TAR Cache Size Sweep ============
  # Default: FPA=8MB, TAR=8MB (both 4-way)
  # Size is in KB, sweep from 4KB to 2MB
  
  utopia_cache_4kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=4"
      - "--perf_model/utopia/tagcache/size=4"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 4KB FPA + 4KB TAR caches"

  utopia_cache_8kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=8"
      - "--perf_model/utopia/tagcache/size=8"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 8KB FPA + 8KB TAR caches"

  utopia_cache_16kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=16"
      - "--perf_model/utopia/tagcache/size=16"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 16KB FPA + 16KB TAR caches"

  utopia_cache_32kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=32"
      - "--perf_model/utopia/tagcache/size=32"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 32KB FPA + 32KB TAR caches"

  utopia_cache_64kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=64"
      - "--perf_model/utopia/tagcache/size=64"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 64KB FPA + 64KB TAR caches"

  utopia_cache_128kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=128"
      - "--perf_model/utopia/tagcache/size=128"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 128KB FPA + 128KB TAR caches"

  utopia_cache_256kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=256"
      - "--perf_model/utopia/tagcache/size=256"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 256KB FPA + 256KB TAR caches"

  utopia_cache_512kb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=512"
      - "--perf_model/utopia/tagcache/size=512"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 512KB FPA + 512KB TAR caches"

  utopia_cache_1mb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=1024"
      - "--perf_model/utopia/tagcache/size=1024"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 1MB FPA + 1MB TAR caches"

  utopia_cache_2mb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/fpacache/size=2048"
      - "--perf_model/utopia/tagcache/size=2048"
      - "--perf_model/utopia/restseg/size=2048,2048"  # Adjust RestSeg size to avoid excessive memory usage
    description: "Utopia with 2MB FPA + 2MB TAR caches"

  # ============ Utopia 4KB-RestSeg Size Sweep ============
  # Sweep the 4KB-RestSeg size from 512MB to 8GB
  # The 2MB-RestSeg is kept constant at 2GB (2048MB)
  
  utopia_restseg_512mb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,512"
    description: "Utopia with 512MB 4KB-RestSeg"

  utopia_restseg_1gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,1024"
    description: "Utopia with 1GB 4KB-RestSeg"

  utopia_restseg_2gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,2048"
    description: "Utopia with 2GB 4KB-RestSeg"

  utopia_restseg_4gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,4096"
    description: "Utopia with 4GB 4KB-RestSeg"

  utopia_restseg_8gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,8192"
    description: "Utopia with 8GB 4KB-RestSeg"

  # Utopia with FPA/TAR access pattern logging enabled
  utopia_access_logging:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/access_pattern_logging=true"
      - "--perf_model/utopia/access_pattern_sample_rate=1"
      - "--perf_model/utopia/restseg/size=2048,8192"
    description: "Utopia with FPA/TAR access pattern logging (100% sampled)"
  
  baseline_ptw_logging:
    file: "reservethp.cfg"
    extends:
      - "--perf_model/reserve_thp/target_fragmentation=0.0"
      - "--perf_model/mmu/ptw_access_logging=true"
      - "--perf_model/mmu/ptw_access_logging_sample_rate=1"
    description: "Reservation-based THP allocator with per-access PTW logging (100% sampled)"


  # DMT
  dmt:
    file: "dmt.cfg"
    description: "Direct Memory Translation"

  # ============ CATS Speculation Configs ============
  # Base CATS config with speculation enabled (prefetch mode)
  
  utopia_cats_512mb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,512"
      - "--perf_model/utopia/speculation/enabled=true"
      - "--perf_model/utopia/speculation/mode=1"
      - "--perf_model/utopia/speculation/credits_max=1000000000"
      - "--perf_model/utopia/speculation/congestion_limit=10000"
    description: "Utopia with 512MB 4KB-RestSeg + CATS speculation (prefetch mode)"

  utopia_cats_1gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,1024"
      - "--perf_model/utopia/speculation/enabled=true"
      - "--perf_model/utopia/speculation/mode=1"
    description: "Utopia with 1GB 4KB-RestSeg + CATS speculation (prefetch mode)"

  utopia_cats_2gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,2048"
      - "--perf_model/utopia/speculation/enabled=true"
      - "--perf_model/utopia/speculation/mode=1"
    description: "Utopia with 2GB 4KB-RestSeg + CATS speculation (prefetch mode)"

  utopia_cats_4gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,4096"
      - "--perf_model/utopia/speculation/enabled=true"
      - "--perf_model/utopia/speculation/mode=1"
    description: "Utopia with 4GB 4KB-RestSeg + CATS speculation (prefetch mode)"

  utopia_cats_8gb:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=2048,8192"
      - "--perf_model/utopia/speculation/enabled=true"
      - "--perf_model/utopia/speculation/mode=1"
    description: "Utopia with 8GB 4KB-RestSeg + CATS speculation (prefetch mode)"

  # Aggressive CATS (early-demand mode with higher credit/congestion limits)
