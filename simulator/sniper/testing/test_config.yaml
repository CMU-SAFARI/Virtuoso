      - "--perf_model/utopia/speculation/congestion_limit=64"
    description: "Utopia: 1GB 2MB-RestSeg + 8GB 4KB-RestSeg + aggressive CATS"

  # ============ CostTopK Migration Policy Configs ============
  # Top-K cost-based migration promotes expensive-to-translate FlexSeg pages to RestSeg
  # Parameters:
  #   - migrate_threshold: score threshold to trigger migration (higher = more selective)
  #   - topk_entries: number of top candidates tracked (higher = more choices)
  #   - credits_max: max migrations per credit epoch (higher = more aggressive)
  #   - score_bits: precision of cost tracking (10 = 0-1023 range)
  
  # Conservative: High threshold, low credits (migrate only very hot pages)
  utopia_costtopk_conservative:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=128"
      - "--perf_model/utopia/restseg/page_size=12"
      - "--perf_model/utopia/restseg/assoc=16"
      - "--perf_model/utopia/restsegs=1"
      - "--perf_model/utopia/migration_cost_topk/enabled=1"
      - "--perf_model/utopia/migration_cost_topk/migrate_threshold=64"
      - "--perf_model/utopia/migration_cost_topk/topk_entries=8"
      - "--perf_model/utopia/migration_cost_topk/credits_max=2"
      - "--perf_model/utopia/legacy_migration_enabled=0"
    description: "CostTopK conservative: high threshold (64), low credits (2)"

  # Moderate: Balanced settings (default-like)
  utopia_costtopk_moderate:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=128"
