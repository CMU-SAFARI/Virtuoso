      - "--perf_model/utopia/migration_cost_topk/credits_max=4"
      - "--perf_model/utopia/legacy_migration_enabled=0"
    description: "CostTopK moderate: medium threshold (32), medium credits (4)"

  # Aggressive: Low threshold, high credits (migrate more pages faster)
  utopia_costtopk_aggressive:
    file: "utopia.cfg"
    extends:
      - "--perf_model/utopia/restseg/size=128"
