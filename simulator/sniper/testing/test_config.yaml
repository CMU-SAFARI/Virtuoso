    traces: [rnd.sift]
    instruction_count: 5000000 # 5M

  utopia_long:
    description: "Full Utopia test with UTLB"
    configs: [reservethp_fully_fragmented,utopia_large_restsegs, utopia_large_4kb_restseg, utopia_high_assoc, utopia_small_restsegs, utopia_tiny_restsegs]
