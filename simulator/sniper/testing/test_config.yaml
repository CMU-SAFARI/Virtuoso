# Metrics to extract from results
metrics:
  - name: "cycles"
    pattern: "performance_model.cycle_count"
  - name: "instructions"
    pattern: "performance_model.instruction_count"
  - name: "tlb_misses"
    pattern: "dtlb.miss"
  - name: "page_faults"
