    traces: [rnd.sift]
    instruction_count: 10000000  # 10M

  # ============================================================
  # Bottom 10 Google Workloads - MPLRU Bandit Evaluation
  # ============================================================
  # These are the 10 Google traces that showed the worst performance
  # with Utopia (11-16% degradation vs ReserveTHP baseline).
  # Testing with 12-arm MPLRU bandit to see if data-protection helps.
  
  google_bottom10_baseline_utopia: 
    description: "Bottom 10 Google workloads: ReserveTHP baseline vs Utopia"
    configs: [reservethp_4channel, utopia, utopia_mplru_bandit]
    traces:
      - sierra.a.4/sierra.a.4_0015.champsim.gz
      - sierra.a.4/sierra.a.4_0017.champsim.gz
      - sierra.a.4/sierra.a.4_0002.champsim.gz
      - sierra.a.4/sierra.a.4_0013.champsim.gz
      - sierra.a.4/sierra.a.4_0014.champsim.gz
      - sierra.a.4/sierra.a.4_0001.champsim.gz
      - yankee/yankee_0012.champsim.gz
      - sierra.a.4/sierra.a.4_0008.champsim.gz
      - sierra.a.4/sierra.a.4_0016.champsim.gz
