    description: "Utopia with debug output for analysis"
    configs: [utopia_debug]
    traces: [rnd.sift]
    instruction_count: 100000  # 100K for detailed log analysis

  utopia_comparison:
    description: "Compare Utopia with and without UTLB"
    configs: [utopia, utopia_no_utlb, baseline]
    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  utopia_logging:
    description: "Utopia with FPA/TAR access pattern logging enabled"
