    traces: [rnd.sift]
    instruction_count: 20000000  # 20M

  # ============ MPLRU Bandit Controller Test Suites ============
  # IPC-only multi-armed bandit for MPLRU level selection

  mplru_bandit_quick:
    description: "Quick test of MPLRU bandit controller (default params)"
    configs: [utopia_mplru_bandit]
    traces: [rnd.sift]
    instruction_count: 5000000  # 5M

