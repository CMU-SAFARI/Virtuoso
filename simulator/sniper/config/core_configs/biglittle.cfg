[core_debug]
name[] = "beefy", "wimpy"

[perf_model/core]
frequency = 2.9 # In GHz
logical_cpus = 1 # Number of logical CPUs per core
core_model = "nehalem"
type = "rob"

[perf_model/core/oneipc]
latency_cutoff = 1000 # In cycles, cutoff for latency-based IPC model

[perf_model/sync]
reschedule_cost = 1000 # Cost of rescheduling a thread (ns)

[clock_skew_minimization/barrier]
quantum = 1000                       # Synchronize after every quantum (ns)

[perf_model/branch_predictor]
type = pentium_m
mispredict_penalty=8 # Reflects just the front-end portion (approx) of the penalty for Interval Simulation


[perf_model/core/rob_timer]
in_order[] = false, true
issue_contention[] = true, true
mlp_histogram[] = false, false           # Collect histogram of memory-level parallelism (slow)
issue_memops_at_issue[] = true, true    # Issue memops to the memory hierarchy at issue time (false = before dispatch)
outstanding_loads[] = 72, 50
outstanding_stores[] = 56, 25
store_to_load_forwarding[] = true, true # Forward data to loads from stores that are still in the store buffer
address_disambiguation[] = true, true   # Allow loads to bypass preceding stores with an unknown address
rob_repartition[] = true, true          # For SMT model with static ROB partitioning, whether to repartition the ROB
                                # across all active threads (true), or keep everyone fixed at a 1/nthreads share (false)
simultaneous_issue[] = true, true       # Whether two different threads can execute in a single cycle. true = simultaneous multi-threading, false = fine-grained multi-threading
commit_width[] = 8, 3                 # Commit bandwidth (instructions per cycle), per SMT thread
rs_entries[] = 97, 97

[perf_model/core/interval_timer]  # though the core type is ROB, still it uses dispatch_width and window_size from interval_time knob
dispatch_width[] = 8, 3     # Number of instructions dispatched per cycle
window_size[] = 400, 150 # Size of the instruction window (ROB) in instructions

[dvfs]
transition_latency = 2000 # In ns, "under 2 microseconds" according to http://download.intel.com/design/intarch/papers/323671.pdf (page 8)

[dvfs/simple]
cores_per_socket = 1

[power]
vdd = 1.2 # Volts
technology_node = 45 # nm


## ---- Memory Subsystem ---- ##
[perf_model/cache]
levels = 2 # Number of cache levels, excluding the NUCA cache

[perf_model/cache]
mshr_size = 32 # Number of MSHRs in the L2 cache [Fix: make better use of this knob]


[perf_model/l1_dcache]
perfect[] = false, false
cache_size[] = 64, 32
associativity[] = 8, 8
address_hash[] = mask, mask
replacement_policy[] = lru, lru
data_access_time[] = 4, 4
tags_access_time[] = 1, 1
perf_model_type[] = parallel, parallel
writethrough[] = 0, 0
shared_cores[] = 1, 1
prefetcher[] = "none", "ip_stride"
outstanding_misses[] = 16, 16 # Sniper uses a different performance model for the MSHRs in the L1 cache. This knob specifies the number of outstanding misses in the L1 cache.

[perf_model/l1_dcache/prefetcher/simple]
flows[] = 10, 10
flows_per_core[] = true, true
num_prefetches[] = 2, 2
stop_at_page_boundary[] = false, false


[perf_model/l1_icache]
perfect[] = false, false
cache_size[] = 64, 32
associativity[] = 8, 8
address_hash[] = mask, mask
replacement_policy[] = lru, lru
data_access_time[] = 4, 4
tags_access_time[] = 1, 1
perf_model_type[] = parallel, parallel
writethrough[] = 0, 0
shared_cores[] = 1, 1

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l1_dcache/prefetcher/ip_stride]
allocate_on_miss = "false"
num_prefetches = 2
num_streams = 64
stop_at_page_boundary = "true"
lookahead = 4

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

## L2s (private, per core)
[perf_model/l2_cache]
associativity[] = 16, 16
cache_size[] = 1024, 256 # In KB
data_access_time[] = 16, 16
tags_access_time[] = 3, 3
prefetcher[] = "none", "streamer"
writeback_time[] = 50, 50 # L3 hit time will be added
perf_model_type[] = parallel, parallel
writethrough[] = 0, 0
shared_cores[] = 1, 1


[perf_model/l2_cache/prefetcher]
prefetch_on_prefetch_hit = true


[perf_model/l2_cache/prefetcher/streamer]
allocate_on_miss = "true"
num_prefetches = 2
num_streams = 64
prefetch_front = 4
max_conf = 7
conf_thresh = 2

[perf_model/l2_cache/prefetcher/simple]
flows=10
flows_per_core = true
num_prefetches = 2
stop_at_page_boundary = false


[perf_model/l2_cache/srrip]
bits = 2
tlb_enabled = false

[perf_model/l2_cache/qbs]
attempts = 4 # Total number of lines that will be considered, last one is forced


[perf_model/l2_cache/prefetcher/streamer]
allocate_on_miss = "true"
num_prefetches = 2
num_streams = 64
prefetch_front = 4
max_conf = 7
conf_thresh = 2

[perf_model/nuca]
enabled = "true"
address_hash = "mask"
cache_size = 2048 # This is per NUCA slice, so the total cache size is cache_size * num_slices ( = num_cores)
associativity = 16
replacement_policy = "srrip" # Static Re-Reference Interval Prediction
tags_access_time = 15     # In cycles. Optimistic timing
data_access_time = 35    # In cycles, parallel with tag access. Optimistic timing
bandwidth = 64           # In GB/s

[perf_model/nuca/cache/srrip]
bits = 2
tlb_enabled = false

[perf_model/nuca/cache/qbs]
attempts = 2 # Total number of lines that will be considered, last one is forced


[perf_model/nuca/queue_model]
enabled = true
type = history_list


[perf_model/cache_usage]
enabled = false

[perf_model/metadata]
shadow_cache_enabled= "false"
shadow_cache_size = 16
shadow_cache_associativity = 8
shadow_cache_hit_latency = 1
shadow_cache_miss_latency = 2
passthrough_loc = 2


[log]
enabled=false


[queue_model/basic]
moving_avg_enabled = "true"
moving_avg_type = "arithmetic_mean"
moving_avg_window_size = 1024
