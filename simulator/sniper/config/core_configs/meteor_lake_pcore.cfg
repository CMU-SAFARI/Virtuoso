# Meteor Lake P-Core Configuration
# =================================
# Intel Meteor Lake Performance Core (Redwood Cove, 2023)
# Based on Intel 4 process, featuring significant IPC improvements
# over prior generations with wider backend and larger structures.

[core_debug]
name = "meteor_lake_pcore"

[perf_model/core]
frequency = 5.1              # Peak turbo frequency in GHz (P-core max)
logical_cpus = 1             # SMT disabled for single-thread focus
core_model = "nehalem"       # Using ROB-based model
type = "rob"

[perf_model/core/oneipc]
latency_cutoff = 1000

[perf_model/sync]
reschedule_cost = 800        # Faster context switching

[clock_skew_minimization/barrier]
quantum = 100

[perf_model/branch_predictor]
type = pentium_m
mispredict_penalty = 1      # Deeper pipeline, higher mispredict cost

[perf_model/core/rob_timer]
in_order = false
issue_contention = true
mlp_histogram = false
issue_memops_at_issue = true
outstanding_loads = 128      # Significantly increased MLP
outstanding_stores = 72      # More store buffer entries
store_to_load_forwarding = true
address_disambiguation = true
rob_repartition = true
simultaneous_issue = true
commit_width = 8             # 8-wide retirement
rs_entries = 192             # Larger reservation station

[perf_model/core/interval_timer]
dispatch_width = 8           # 8-wide decode/dispatch (Redwood Cove)
window_size = 512            # 512-entry ROB (larger than Raptor Cove)

[dvfs]
transition_latency = 1000    # Faster DVFS transitions

[dvfs/simple]
cores_per_socket = 1

[power]
vdd = 0.9                    # Lower voltage (Intel 4 process)
technology_node = 7          # Intel 4 ~ 7nm class


## ---- Memory Subsystem ---- ##
## Meteor Lake P-core: 48KB L1D, 32KB L1I, 2MB L2

[perf_model/dram_directory]
total_entries = 16777216   # 16M entries
associativity = 256

[perf_model/cache]
levels = 2
mshr_size = 80               # @kanellok: We are not sure about this number - need to verify

[perf_model/l1_dcache]
perfect = false
cache_size = 48              # 48KB L1D (increased from 32KB)
associativity = 12           # 12-way associativity
address_hash = "xor_mod"
replacement_policy = lru
data_access_time = 4         # ~4 cycles
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1
prefetcher = "none"
outstanding_misses = 50      #  @kanellok: We are not sure about this number - need to verify

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l1_dcache/prefetcher/simple]
flows = 16
flows_per_core = true
num_prefetches = 4
stop_at_page_boundary = false

[perf_model/l1_dcache/prefetcher/ip_stride]
allocate_on_miss = "false"
num_prefetches = 4
num_streams = 128
stop_at_page_boundary = "true"
lookahead = 8

[perf_model/l1_icache]
perfect = false
cache_size = 64              # 64KB L1I
associativity = 16
address_hash = "xor_mod"
replacement_policy = lru
data_access_time = 4
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l2_cache]
cache_size = 2048            # 2MB L2 per P-core
associativity = 16
data_access_time = 12        # ~12 cycles
tags_access_time = 2
prefetcher = "none"
writeback_time = 40
perf_model_type = parallel
writethrough = 0
shared_cores = 1
address_hash = "xor_mod"

[perf_model/l2_cache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l2_cache/prefetcher/streamer]
allocate_on_miss = "true"
num_prefetches = 4
num_streams = 128
prefetch_front = 8
max_conf = 7
conf_thresh = 2

[perf_model/l2_cache/prefetcher/simple]
flows = 16
flows_per_core = true
num_prefetches = 4
stop_at_page_boundary = false

[perf_model/l2_cache/srrip]
bits = 3
tlb_enabled = false

[perf_model/l2_cache/qbs]
attempts = 6

[perf_model/nuca]
enabled = "true"
address_hash = "xor_mod"
cache_size = 8192            # 4MB LLC slice per core (shared L3)
associativity = 16
replacement_policy = lru
tags_access_time = 15
data_access_time = 20        # Higher L3 latency
bandwidth = 128              # High bandwidth interconnect

[perf_model/nuca/cache/srrip]
bits = 3
tlb_enabled = false

[perf_model/nuca/cache/qbs]
attempts = 4

[perf_model/nuca/queue_model]
enabled = true
type = history_list

[perf_model/nuca/mplru]
mode = disabled         # always: always protect metadata, adaptive: protect when TLB MPKI is high, disabled: standard LRU
mpki_threshold = 10.0   # TLB MPKI threshold for adaptive mode

[perf_model/nuca/mplru/controller]
enabled = false          # Enable adaptive controller
epoch_instructions = 1000     # Instructions per epoch for decisions
tr_share_min = 0.01     # Engage gate: minimum translation share (1%)
rho_min = 0.02          # Engage gate: minimum rho (tr/data ratio)
meta_level_start = 2    # Starting meta_level (0-3)
meta_level_max = 15      # Maximum meta_level (0-3)
data_pain_frac = 0.05   # Back off if data pain rises by this fraction
tr_gain_frac = 0.03     # Advance if translation gain exceeds this fraction
cooldown_epochs = 2     # Wait this many epochs between level changes
max_step_per_epoch = 1  # Maximum level change per epoch
ema_alpha = 0.2         # EMA smoothing factor for stall tracking



[perf_model/cache_usage]
enabled = false

[perf_model/metadata]
shadow_cache_enabled = "false"
shadow_cache_size = 16
shadow_cache_associativity = 8
shadow_cache_hit_latency = 1
shadow_cache_miss_latency = 2
passthrough_loc = 2

[perf_model/mimicos_host]
enabled = "false"

[log]
enabled = false

[queue_model/basic]
moving_avg_enabled = "true"
moving_avg_type = "arithmetic_mean"
moving_avg_window_size = 1024