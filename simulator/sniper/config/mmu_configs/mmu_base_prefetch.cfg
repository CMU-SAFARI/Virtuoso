
# Baseline MMU configuration with TLB prefetching enabled.
# Mirrors mmu_base.cfg but sets prefetch_enabled = true so the PQ prefetch
# layer (with ASP by default) is instantiated.

[perf_model/mmu]
ptw_access_logging_sample_rate = 100
type="default"
page_table_walkers=4
metadata_table_name="none"
count_page_fault_latency = "true"
correct_prediction_latency=4 # Page size prediction correct latency
misprediction_latency=10 # Page size prediction misprediction latency
page_size_prediction_enabled=false # Enable page size prediction

[perf_model/mmu/tlb_subsystem]
number_of_levels = 2
prefetch_enabled = true
pagesize_predictor_name = "superpage"

[perf_model/mmu/pwc]
enabled=true
levels=3
entries=32,32,32
associativity=4,4,4
access_penalty=1
miss_penalty=1

[perf_model/superpage]
small_page_size = 12
large_page_size = 21
table_size = 2

[perf_model/mmu/tlb_level_1]
number_of_tlbs = 3

[perf_model/mmu/tlb_level_1/tlb1]
type = "Data"
size = 64
assoc = 4
page_size = 1
page_size_list = 12
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_1/tlb2]
type = "Data"
size = 64
assoc = 4
page_size = 1
page_size_list = 21
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_1/tlb3]
type = "Instruction"
size = 64
assoc = 4
page_size = 2
page_size_list = 12,21
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_2]
number_of_tlbs = 1

[perf_model/mmu/tlb_level_2/tlb1]
type = "Unified"
size = 2048
assoc = 8
page_size=2
page_size_list = 12,21
allocate_on_miss = "false"
access_latency = 12
replacement_policy = "lru"

[perf_model/mmu/tlb_level_2/tlb1/chirp]
table_size = 1024
threshold = 2

[perf_model/superpage]
small_page_size = 12
large_page_size = 21
table_size = 2

[perf_model/mmu/tlb_prefetch]
level = 2
number_of_pqs = 1

[perf_model/mmu/tlb_prefetch/pq1]
type = "Data"
size = 1024
access_latency=1
page_size=2
page_size_list=12,21
assoc = 2
number_of_prefetchers=1
prefetcher_list="asp" # Arbitrary-Stride Prefetcher based on Agile TLB Prefetching

[perf_model/mmu/tlb_prefetch/pq1/stride_prefetcher]
length=2

[perf_model/mmu/tlb_prefetch/pq1/asp_prefetcher]
table_size=16
prefetch_threshold=0
extra_prefetch="true"
lookahead=4
degree=3

[perf_model/mmu/tlb_prefetch/pq1/recency_prefetcher]
page_shift=12
prefetch_same_recency="true"
prefetch_recency_minus_1="true"
prefetch_recency_plus_1="true"
prefetch_on_tlb_hit="false"
model_prefetch_walks="false"
consume_pq_on_hit="true"
model_pointer_chase="false"

[perf_model/mmu/tlb_prefetch/pq1/dp_prefetcher]
page_shift=12
num_rows=256
num_slots=2
assoc=1
model_prefetch_walks="false"

[perf_model/mmu/tlb_subsystem/page_size_predictor]
type = "default"
