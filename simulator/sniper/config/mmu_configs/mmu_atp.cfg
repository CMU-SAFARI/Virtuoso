
# MMU configuration with Agile TLB Prefetcher (ATP) + Sampling-Based
# Free TLB Prefetching (SBFP).
#
# Based on the paper "Exploiting Page Table Locality for Agile TLB
# Prefetching" design points.

[perf_model/mmu]
type="default"
page_table_walkers=4
metadata_table_name="none"
count_page_fault_latency = "false"
correct_prediction_latency=4
misprediction_latency=10
page_size_prediction_enabled=false

ptw_access_logging = false
ptw_access_logging_sample_rate = 100

[perf_model/mmu/tlb_subsystem/page_size_predictor]
type = "default"

[perf_model/mmu/tlb_subsystem]
number_of_levels = 2
prefetch_enabled = true

[perf_model/mmu/pwc]
enabled=true
levels=3
entries=32,32,32
associativity=4,4,4
access_penalty=1
miss_penalty=1

# ── L1 TLBs ──────────────────────────────────────────────────────────

[perf_model/mmu/tlb_level_1]
number_of_tlbs = 3

[perf_model/mmu/tlb_level_1/tlb1]
type = "Data"
size = 64
assoc = 4
page_size = 1
page_size_list = 12
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_1/tlb2]
type = "Data"
size = 64
assoc = 4
page_size = 1
page_size_list = 21
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_1/tlb3]
type = "Instruction"
size = 64
assoc = 4
page_size = 2
page_size_list = 12,21
allocate_on_miss = "true"
access_latency = 1

# ── L2 TLB ───────────────────────────────────────────────────────────

[perf_model/mmu/tlb_level_2]
number_of_tlbs = 1

[perf_model/mmu/tlb_level_2/tlb1]
type = "Unified"
size = 2048
assoc = 8
page_size=2
page_size_list = 12,21
allocate_on_miss = "false"
access_latency = 12

# ── Superpage predictor ──────────────────────────────────────────────

[perf_model/superpage]
small_page_size = 12
large_page_size = 21
table_size = 2

# ── TLB Prefetch Queue ──────────────────────────────────────────────

[perf_model/mmu/tlb_prefetch]
number_of_pqs = 1
level = 2

[perf_model/mmu/tlb_prefetch/pq1]
type = "Data"
size = 1024
access_latency = 0
page_size = 2
page_size_list = 12,21
assoc = 2
number_of_prefetchers = 1
prefetcher_list = "atp"

# ── Agile TLB Prefetcher (ATP + SBFP) configuration ─────────────────
#
# ATP selects among three child prefetchers (H2P, MASP, STP) using
# three saturating counters and per-child fake prefetch queues (FPQs).
#
# SBFP exploits cache-line locality of PTEs: the 7 neighboring leaf
# PTEs that share a 64B cache line with the demand PTE are "free".
# A 14-entry FDT (Free Distance Table) with 10-bit saturating counters
# tracks which distances tend to be useful; a 64-entry Sampler FIFO
# provides training data for FDT.
#
# Design points match the paper's evaluated configuration.

[perf_model/mmu/tlb_prefetch/pq1/atp_prefetcher]
pq_size            = 64
sampler_size       = 64
fpq_size           = 16
fdt_counter_bits   = 10
fdt_threshold      = 100
enable_pref_bits   = 8
select1_bits       = 6
select2_bits       = 2
masp_entries       = 64
masp_assoc         = 4
page_shift         = 12
