

[perf_model/mmu]
type="utopia"
page_table_walkers=4
metadata_table_name="none"
count_page_fault_latency="false"
page_size_prediction_enabled=false # Enable page size prediction
ptw_access_logging = false
ptw_access_logging_sample_rate = 100  # Log every Nth PTW access (1 = log all)



[perf_model/mmu/tlb_subsystem/page_size_predictor]
type = "default"

# This is a basic MMU configuration file. It is used to configure the MMU model in Sniper.
# We have a with a TLB subsystem and 4 page table walkers.
# The TLB subsystem has two levels of TLBs.

# Simple schematic: 

# 1st level TLBs: L1 TLB (Data for 4KB pages), L1 TLB (Data for 2MB pages), L1 TLB (Instruction)
# 2nd level TLBs: L2 TLB (Unified for 4KB and 2MB pages) 

# On a TLB miss, there are 4 page table walkers that can be used to walk the page table.

[perf_model/mmu/tlb_subsystem]
number_of_levels = 2
prefetch_enabled = false
pagesize_predictor_name = "none"

[perf_model/mmu/pwc]
enabled=true
levels=3
entries=32,32,32
associativity=4,4,4
access_penalty=1
miss_penalty=1

[perf_model/mmu/tlb_level_1]
number_of_tlbs = 3

[perf_model/mmu/tlb_level_1/tlb1]
type = "Data"
size = 64
assoc = 4
page_size = 1
page_size_list = 12
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_1/tlb2]
type = "Data"
size = 64
assoc = 4
page_size = 1
page_size_list = 21
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_1/tlb3]
type = "Instruction"
size = 64
assoc = 4
page_size = 2
page_size_list = 12,21
allocate_on_miss = "true"
access_latency = 1

[perf_model/mmu/tlb_level_2]
number_of_tlbs = 1

[perf_model/mmu/tlb_level_2/tlb1]
type = "Unified"
size = 2048
assoc = 8
page_size=2
page_size_list = 12,21
allocate_on_miss = "false"
access_latency = 12


[perf_model/utopia/tagcache]
# Tag cache for RestSeg lookup (caches RestSeg metadata)
size = 8
assoc = 4
access_penalty = 0
miss_penalty = 0  # Parallel access to Utopia

[perf_model/utopia/fpacache]
# Fingerprint Array cache for RestSeg (replaces permission filter)
# Caches fingerprint array entries used for filtering before tag lookup
# Each entry is 1 byte per way, so 16-way = 16 bytes per set (fits in cache line)
size = 8
assoc = 4
access_penalty = 0
miss_penalty = 0  # Parallel access


[perf_model/utopia/mmu]
disable_fp_tar_caches = true
disable_fp_cache = true
disable_tar_cache = true

[perf_model/utopia]
radix_lookup_enabled = true

[perf_model/utopia/utlb]
# UTLB (Utopia TLB) - Specialized TLB for RestSeg translations
# Stores compact (VPN_tag, seg_id, way_idx) tuples instead of full PTEs
# Entry format: 25-34 bits vs 96 bits = 2.8x capacity improvement
#
# Entry structure:
#   - VPN tag: 19-28 bits (VPN minus set_index)
#   - seg_id: 1 bit (which RestSeg: 0=2MB, 1=4KB)
#   - way_idx: 4 bits (which way in RestSeg set)
#   - valid: 1 bit
#
# For the same SRAM area as a 2K-entry standard TLB, we can have ~4K+ entries
# On UTLB hit, we skip RestSegWalk entirely and compute PA directly
enabled = true
entries = 4096
assoc = 8
latency = 1

[perf_model/utopia/access_logging]
# FPA/TAR Access Pattern Logging
# Generates a CSV file with detailed FPA/TAR access information
# Useful for analyzing locality patterns and cache behavior
#
# Output files:
#   fpa_tar_access_log_coreN.csv: access_num,vpn,access_type,restseg_id,cache_line_addr,utopia_cache_hit,l2_hit,nuca_hit,dram_hit,latency_ns
#   ptw_access_log_coreN.csv: ptw_num,vpn,level,table,cache_line_addr,l1_hit,l2_hit,nuca_hit,dram_hit,latency_ns,is_pte

[perf_model/utopia]
# Enable detailed FPA/TAR and PTW access pattern logging (outputs CSV)
access_pattern_logging = false
# Log every N-th access (1 = all, 100 = 1%, reduces file size for long runs)
access_pattern_sample_rate = 1

# ============================================================================
# CATS - Confidence-Aware Throttled Speculation
# ============================================================================
# CATS provides intelligent speculation throttling for RestSeg lookups:
#   1. Confidence gating: Only speculate when historical accuracy is high
#   2. Credit-based throttling: Limit speculation rate per epoch
#   3. Congestion gating: Back off when memory system is busy
#   4. Way prediction: Predict likely way based on history
#
# Modes:
#   0 = Disabled (no speculation)
#   1 = Prefetch-only (non-blocking prefetch to predicted data)
#   2 = Early-demand (issue demand request speculatively)
#
# Default: DISABLED for baseline compatibility
# ============================================================================

[perf_model/utopia/speculation]
enabled = false
wmax = 4
conf_bits = 3
conf_threshold = 3
conf_table_entries = 16384
way_predictor_enabled = true
lastway_table_entries = 8192
enable_instruction_speculation = false





# ============================================================================
# Top-K Cost-based Migration Policy (Hardware-friendly)
# ============================================================================
# This policy tracks the translation cost (PTW overhead + DRAM accesses) for
# 4KB pages and migrates the most expensive pages to RestSeg.
#
# Key concepts:
#   - PTE cost score: 10-bit saturating counter per VPN, incremented on PTW
#   - Top-K table: Small CAM-like structure tracking highest-cost VPNs
#   - Credit throttling: Limits migration rate to prevent thrashing
#   - Epoch decay: Prevents stale entries from dominating
#
# This targets the ~10% most expensive-to-translate pages for migration.
# ============================================================================

[perf_model/utopia/migration_cost_topk]
# Master enable for cost-based migration (0=disabled, 1=enabled)
enabled = 0

# Only track 4KB pages (FlexSeg pages that require PTW)
page_size_bits = 12

# PTE cost scoring (10-bit saturating counter)
score_bits = 10
ptw_base_increment = 1
dram_weighted_increment_cap = 3

# Top-K table configuration
topk_entries = 16
sticky_threshold = 2
cooldown_epochs = 2

# Epoch configuration (translation-count based)
ranking_epoch_translations = 1024
credit_epoch_translations = 1024

# Credit-based throttling
credits_max = 4
credits_refill = 1

# Migration trigger threshold (score must exceed this to migrate)
migrate_threshold = 32

# Score decay after migration (score >>= shift)
post_migrate_score_shift = 2

