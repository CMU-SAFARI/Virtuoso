
# =============================================================================
# NUMA Configuration for TieredDramCntlr
# =============================================================================
# Include this file (--cfg numa.cfg) when running NUMA-enabled experiments.
# This configures the hardware side (DRAM controller NUMA topology).
# Allocator-side NUMA is configured in the allocator cfg (numa_reserve_thp.cfg, etc.)
#
# Example usage:
#   ./run-sniper -c gainestown -c numa -c physical_memory_allocators/numa_reserve_thp ...

[perf_model/dram/numa]
# Enable/disable NUMA support in the DRAM controller
enabled = true

# Number of NUMA nodes
num_nodes = 2

# Remote access latency penalty in nanoseconds (additive on top of DRAM latency)
remote_latency_ns = 40

# Number of cores per NUMA node (for core-to-node affinity mapping)
# Total cores / num_nodes must be an integer
cores_per_node = 4

# NUMA placement policy for speculation engine:
#   "local"       - primary node = CPU-local, cpu-local fallback enabled
#   "preferred"   - primary node = preferred_node, cpu-local fallback enabled
#   "interleaved" - deterministic VPN % num_nodes, no hints/counters needed
policy = local

# Preferred node (only used when policy = "preferred")
preferred_node = 0

# --- Per-node configuration ---
# Each node specifies: capacity_gb, kernel_reserved_gb, type, tier_id, hit_where
# type: "ddr" | "cxl" | "constant" | "readwrite" | "normal" (DramPerfModel factory)
# tier_id: which tier this node maps to (for non-NUMA tier configs)

[perf_model/dram/numa/node0]
capacity_gb = 16
kernel_reserved_gb = 2
type = ddr
tier_id = 0

[perf_model/dram/numa/node1]
capacity_gb = 16
kernel_reserved_gb = 2
type = ddr
tier_id = 0
