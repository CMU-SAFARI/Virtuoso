# Aggressive Multi-Level Prefetching Configuration
# =================================================
# IP-Stride at L1D + Streamer at L2.
# Best for workloads with mixed access patterns.
# Mimics modern Intel prefetcher hierarchy.

[perf_model/l1_dcache]
prefetcher = "ip_stride"

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l1_dcache/prefetcher/ip_stride]
allocate_on_miss = "true"
num_prefetches = 4
num_streams = 128
stop_at_page_boundary = "true"
lookahead = 8

[perf_model/l2_cache]
prefetcher = "streamer"

[perf_model/l2_cache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l2_cache/prefetcher/streamer]
allocate_on_miss = "true"
num_prefetches = 4
num_streams = 128
prefetch_front = 8
max_conf = 7
conf_thresh = 2
