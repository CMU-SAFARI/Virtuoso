# Meteor Lake Style Prefetching Configuration
# ============================================
# Modern Intel-style prefetcher configuration:
# - IP-Stride at L1D for stride patterns
# - Streamer at L2 for spatial locality
# - Large stream tables and aggressive lookahead
#
# Tuned to match Meteor Lake P-core behavior.

[perf_model/l1_dcache]
prefetcher = "ip_stride"

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l1_dcache/prefetcher/ip_stride]
allocate_on_miss = "true"     # Train on misses
num_prefetches = 6            # Issue up to 6 prefetches
num_streams = 256             # Large PC-indexed table
stop_at_page_boundary = "false"  # Cross page boundaries (TLB permitting)
lookahead = 16                # Aggressive lookahead

[perf_model/l2_cache]
prefetcher = "streamer"

[perf_model/l2_cache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l2_cache/prefetcher/streamer]
allocate_on_miss = "true"
num_prefetches = 8            # Aggressive L2 prefetching
num_streams = 256             # Many concurrent streams
prefetch_front = 16           # Look far ahead
max_conf = 15                 # Higher confidence levels
conf_thresh = 4               # Need more confidence to prefetch
