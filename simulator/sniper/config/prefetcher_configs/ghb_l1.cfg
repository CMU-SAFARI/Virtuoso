# GHB Prefetcher Configuration
# =============================
# Global History Buffer prefetcher at L1D.
# Uses delta correlation to predict future accesses.
# Good for complex but repeating patterns.

[perf_model/l1_dcache]
prefetcher = "ghb"

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l1_dcache/prefetcher/ghb]
ghb_size = 256
table_size = 256
prefetch_width = 4
prefetch_depth = 2

[perf_model/l2_cache]
prefetcher = "none"
