# Stream Prefetcher Configuration
# ================================
# Stream-based prefetcher at L2 cache.
# Good for sequential and streaming workloads.

[perf_model/l1_dcache]
prefetcher = "none"

[perf_model/l2_cache]
prefetcher = "streamer"

[perf_model/l2_cache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l2_cache/prefetcher/streamer]
allocate_on_miss = "true"
num_prefetches = 4
num_streams = 64
prefetch_front = 4
max_conf = 7
conf_thresh = 2
