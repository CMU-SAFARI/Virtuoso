# Conservative Prefetching Configuration
# =======================================
# Low-aggression prefetching for bandwidth-limited scenarios.
# Good when memory bandwidth is constrained.

[perf_model/l1_dcache]
prefetcher = "ip_stride"

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = false  # Don't chain prefetches

[perf_model/l1_dcache/prefetcher/ip_stride]
allocate_on_miss = "true"
num_prefetches = 2
num_streams = 32
stop_at_page_boundary = "true"
lookahead = 2

[perf_model/l2_cache]
prefetcher = "streamer"

[perf_model/l2_cache/prefetcher]
prefetch_on_prefetch_hit = false

[perf_model/l2_cache/prefetcher/streamer]
allocate_on_miss = "true"
num_prefetches = 2
num_streams = 32
prefetch_front = 2
max_conf = 7
conf_thresh = 4               # Higher threshold = more conservative
