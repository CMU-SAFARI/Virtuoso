# IP-Stride Prefetcher Configuration
# ===================================
# PC-indexed stride prefetcher at L1D.
# Good for regular strided access patterns.

[perf_model/l1_dcache]
prefetcher = "ip_stride"

[perf_model/l1_dcache/prefetcher]
prefetch_on_prefetch_hit = true

[perf_model/l1_dcache/prefetcher/ip_stride]
allocate_on_miss = "true"
num_prefetches = 4
num_streams = 64
stop_at_page_boundary = "true"
lookahead = 4

[perf_model/l2_cache]
prefetcher = "none"
