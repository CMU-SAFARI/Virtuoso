

[perf_model/mimicos_host]
memory_allocator_type = "utopia"
memory_allocator_name = "utopia"
page_fault_handler = "utopia"
number_of_page_sizes = 2
page_size_list = 12, 21
swap_enabled = false

[general]
# Use the Utopia exception handler for optimal RestSeg/FlexSeg handling
# RestSeg allocations skip page table updates (range-based translation)
# FlexSeg allocations update page tables normally
exception_handler_type = "utopia"



[perf_model/utopia/restseg]
# RestSeg Configuration
# =====================
# Total memory = 132 GB
# RestSegs are carved from kernel memory (no aliasing with FlexSeg) #
# RestSeg-0 (2MB pages): 8192 MB = 8 GB → 4K x 2MB pages, 8-way = 512 sets
# RestSeg-1 (4KB pages): 8192 MB = 8 GB → 2M x 4KB pages, 16-way = 128K sets
# Total RestSeg: 16 GB
# FlexSeg: remaining ~116 GB
#
# Replacement: LRU (hardcoded in RestSeg implementation)
# Indexing: mask-based (VPN % num_sets)
#
size = 2048,8192
page_size = 21,12
assoc = 8,8

[perf_model/utopia]
# Enable Utopia allocator
enabled = "true"

# ============ RestSeg Configuration ============
# RestSeg 0: 2MB pages (large, hot pages)
# RestSeg 1: 4KB pages (smaller, cooler pages)
restsegs = 2

# Fingerprint bits for CRC-8 based filtering (1-8, default 4)
# Higher values reduce false positives but require more storage
fingerprint_bits = 4

# Enable fingerprint-first filtering (1=enabled, 0=disabled)
# When enabled, fingerprint array is consulted before tag array
# to reduce unnecessary tag lookups on RestSeg misses
fingerprint_enabled = 1

# ============ Fingerprint Speculation ============
# Enable speculative data prefetch on fingerprint match
# When fingerprints match, prefetch data cache lines for candidate ways
# before TAG verification completes (hides translation latency)
fp_speculation_enabled = false

# ============ Adaptive RestSeg Walk ============
# Enable adaptive sequential/parallel RestSeg access based on hit rate
# If one RestSeg dominates hits (>threshold), access it first sequentially
# Otherwise, access both RestSegs in parallel
adaptive_rsw_enabled = true
rsw_sequential_threshold = 0.90
rsw_warmup_accesses = 1000

# ============ Allocation Policy ============
# First-touch allocation is now handled by the hierarchy:
#   RestSeg-2MB → FlexSeg-THP → RestSeg-4KB → FlexSeg-4KB
# No configuration needed for first-touch; the allocation order is fixed.

# Migration policy is now configured via [perf_model/utopia/migration_cost_topk] section
# Legacy threshold-based migration (below) only applies when CostTopK is disabled

# ============ Eviction Thresholds ============
# TLB eviction threshold: pages with TLB misses >= this value may be evicted from RestSeg
tlb_eviction_thr = 2

# PTE eviction threshold: pages with PTW >= this value may be promoted to RestSeg
pte_eviction_thr = 2

# ============ Memory Configuration ============
# Total physical memory in pages (132GB = 34603008 * 4KB)
memory_size = 131072

# Kernel reserved memory in pages (32GB = 8388608 * 4KB)
# RestSegs are allocated from kernel memory, so no aliasing with FlexSeg
# RestSeg-0: 8GB, RestSeg-1: 8GB = 16GB (within 32GB kernel)
kernel_size = 32768

# Maximum buddy allocator order (2^12 = 4096 pages = 16MB contiguous)
max_order = 12

# ============ Fragmentation Settings ============
# Target fragmentation (1.0 = no fragmentation, 0.0 = full fragmentation)
target_fragmentation = 0.0

# Fragmentation type: "largepage" fragments at 2MB boundaries
frag_type = "largepage"

# ============ Migration Thresholds ============
# Enable/disable legacy threshold-based migration (0 = disabled, 1 = enabled)
legacy_migration_enabled = 0

# Promote to RestSeg when PTW count exceeds this
ptw_migration_threshold = 2

# Promote to RestSeg when DRAM accesses exceed this  
dram_accesses_migration_threshold = 2

# THP promotion threshold (fraction of 4KB pages in 2MB region needed for coalescing)
# 75 = 75% of 4KB pages must be present to coalesce into 2MB
thp_promotion_threshold = 0
threshold_for_promotion = 0.0