[perf_model/mimicos_host]
memory_allocator_type = "reserve_thp"
memory_allocator_name = "reserve_thp"
page_fault_handler = "default"
number_of_page_sizes = 2
page_size_list = 12, 21
swap_enabled = false

[perf_model/reserve_thp]
memory_size = 131072
target_fragmentation = 0.0 # 0.0 means that no large page is available, the whole memory is fragmented
kernel_size = 32768           # 1.0 means that the whole memory is available for allocation of large pages
max_order = 12
frag_type = "largepage"
threshold_for_promotion= 0.0
# Fragmentation mode: "ratio" (percentage-based) or "count" (exact number of free 2MB pages)
fragmentation_mode = "ratio"
# Target number of free 2MB pages (only used when fragmentation_mode = "count")
target_free_2mb_pages = 0
