
[perf_model/mimicos_host]
memory_allocator_type = "numa_reserve_thp"
memory_allocator_name = "numa_reserve_thp"
page_fault_handler = "default"
number_of_page_sizes = 2
page_size_list = 12, 21
swap_enabled = false

[perf_model/numa_reserve_thp]
# --- Base ReserveTHP knobs ---
memory_size = 131072
target_fragmentation = 0.0
kernel_size = 32768
max_order = 12
frag_type = "largepage"
threshold_for_promotion = 0.0
fragmentation_mode = "ratio"
target_free_2mb_pages = 0

# --- NUMA-specific knobs ---
# Number of NUMA nodes
num_numa_nodes = 2

# NUMA placement policy: "local", "bind", "interleave", "preferred"
numa_policy = "local"

# Per-node utilization threshold [0.0-1.0]: above this, spill to other nodes
utilization_threshold = 0.85

# Per-node capacity in MB (comma-separated, one per node)
per_node_capacity_mb = "65536, 65536"

# Per-node kernel reservation in MB (comma-separated, one per node)
per_node_kernel_mb = "16384, 16384"
