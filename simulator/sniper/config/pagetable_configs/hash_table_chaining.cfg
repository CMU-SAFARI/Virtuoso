# In this hash table design, collisions are resolved by chaining. 



[perf_model/mimicos_host]
page_table_type="hash_table"
page_table_name="hash_table_chaining"

[perf_model/mmu]
ptw_filter_type="default"

[perf_model/hash_table_chaining]
page_sizes=2
page_size_list=12,21
page_table_size_list=65536,256
resize_threshold=0.6  # Resize when 60% of root slots are occupied
resize_factor=2       # Double the table size on resize