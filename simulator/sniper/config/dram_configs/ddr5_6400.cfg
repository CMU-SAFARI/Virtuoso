# DDR5-6400 DRAM Configuration (High-Performance)
#
# DDR5-6400 is a higher-speed DDR5 variant used in enthusiast/server systems.
#
# Key specs:
#   - Speed: 6400 MT/s
#   - Bandwidth: ~102 GB/s per DIMM (2 channels)
#   - CAS Latency: CL46 typical
#   - tRCD/tRP: ~14.4ns
#
# Usage:
#   ./run-sniper -c gainestown -c dram_configs/ddr5_6400 -- ./benchmark

[perf_model/dram]
num_controllers = 1
type = ddr
latency = 75                        # Slightly lower effective latency due to higher speed
per_controller_bandwidth = 102.4    # GB/s: 6400 MT/s * 8 bytes * 2 channels
chips_per_dimm = 8
dimms_per_controller = 2
localdram_size = 1024

[perf_model/dram/queue_model]
enabled = true
type = basic

[perf_model/dram/ddr]
num_banks = 32
num_bank_groups = 8
num_ranks = 2
num_channels = 2

data_bus_width = 32
dram_speed = 6400

dram_page_size = 128
open_page_mapping = true
randomize_address = false
randomize_offset = 0

# DDR5-6400 CL46 timing (in ns)
bank_keep_open = 60000
bank_open_delay = 14                # tRCD ~14.4ns
bank_close_delay = 14               # tRP ~14.4ns
access_cost = 14                    # tCL ~14.4ns (CL46 @ 6400)

intercommand_delay = 3
intercommand_delay_long = 6
intercommand_delay_short = 2

controller_delay = 12
refresh_interval = 32000000
refresh_length = 295

column_bits_shift = 14
required_bank_bits = 5
required_rank_bits = 1
required_channel_bits = 1
dram_page_size_bits = 7

constant_time_policy = false
selective_constant_time_policy = false
open_row_policy = true

[perf_model/dram/ddr]
address_mapping = xor

[perf_model/dram/ddr/xor]
channel_bits = 1
rank_bits = 1
bank_bits = 5
page_size_bits = 7
xor_offset = 0
