# DDR5-4800 DRAM Configuration
#
# DDR5 key improvements over DDR4:
#   - Higher speeds: 4800 MT/s (vs 2400-3200 MT/s for DDR4)
#   - On-die ECC
#   - Two independent 32-bit channels per DIMM (vs one 64-bit)
#   - More bank groups (8 vs 4)
#   - Same-bank refresh
#   - Lower voltage (1.1V vs 1.2V)
#
# Timing based on DDR5-4800 JEDEC specifications:
#   - tCL (CAS Latency): 40 cycles @ 4800 MT/s = ~16.67ns
#   - tRCD: 40 cycles = ~16.67ns
#   - tRP: 40 cycles = ~16.67ns
#   - tRAS: 76 cycles = ~31.67ns
#
# Usage:
#   ./run-sniper -c gainestown -c dram_configs/ddr5_4800 -- ./benchmark

[perf_model/dram]
num_controllers = 1
type = ddr
latency = 80                        # Total DRAM latency in ns (~80ns for DDR5)
per_controller_bandwidth = 76.8     # GB/s: 4800 MT/s * 8 bytes * 2 channels = 76.8 GB/s
chips_per_dimm = 8
dimms_per_controller = 2
localdram_size = 1024               # MB

[perf_model/dram/queue_model]
enabled = true
type = basic

[perf_model/dram/ddr]
# DDR5 bank structure (per channel)
num_banks = 32                      # 32 banks per channel (4 bank groups x 8 banks)
num_bank_groups = 8                 # DDR5 has 8 bank groups (vs 4 in DDR4)
num_ranks = 2
num_channels = 2                    # DDR5 DIMM has 2 independent 32-bit channels

# DDR5 speed
data_bus_width = 32                 # 32-bit per channel (2 channels = 64-bit effective)
dram_speed = 4800                   # 4800 MT/s

# Page/row buffer
dram_page_size = 128                # Cache lines (8KB row buffer / 64B = 128)
open_page_mapping = true
randomize_address = false
randomize_offset = 0

# DDR5 timing parameters (in ns, based on DDR5-4800 CL40)
bank_keep_open = 60000              # Row buffer timeout (60us)
bank_open_delay = 17                # tRCD ~16.67ns, rounded to 17ns
bank_close_delay = 17               # tRP ~16.67ns, rounded to 17ns  
access_cost = 17                    # tCL ~16.67ns (CAS latency)

# Inter-command delays
intercommand_delay = 4              # tCCD_L (same bank group)
intercommand_delay_long = 8         # tCCD_L_WR
intercommand_delay_short = 2        # tCCD_S (different bank group)

# Controller overhead
controller_delay = 15               # Controller processing delay (ns)

# Refresh (DDR5 same-bank refresh)
refresh_interval = 32000000         # 32ms (DDR5 has per-bank refresh)
refresh_length = 295                # tRFC ~295ns for 16Gb density

# Address mapping bits
column_bits_shift = 14
required_bank_bits = 5              # log2(32) = 5
required_rank_bits = 1              # log2(2) = 1
required_channel_bits = 1           # log2(2) = 1
dram_page_size_bits = 7             # log2(128) = 7

# Row/page policy
constant_time_policy = false
selective_constant_time_policy = false
open_row_policy = true

#==============================================================================
# Address Mapping Configuration
#==============================================================================
[perf_model/dram/ddr]
address_mapping = xor

[perf_model/dram/ddr/xor]
channel_bits = 1
rank_bits = 1
bank_bits = 5
page_size_bits = 7
xor_offset = 0

[perf_model/dram/ddr/open_page]
channel_bits = 1
rank_bits = 1
bank_bits = 5
page_size_bits = 7

[perf_model/dram/ddr/closed_page]
column_bits_shift = 2
