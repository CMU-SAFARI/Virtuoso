# Read/Write DRAM — 1 controller, 153 GB/s
# ==========================================
# DDR5-4800 aggregate bandwidth (~153.6 GB/s) served by a single controller.
# Suitable for 1-core and 2-core configs.

[perf_model/dram]
num_controllers = 1
type = readwrite
latency = 55                        # DRAM access latency in ns
per_controller_bandwidth = 153      # GB/s (full DDR5-4800 dual-channel)

[perf_model/dram/queue_model]
enabled = true
type = history_list

[perf_model/dram/readwrite]
shared = true                       # Reads and writes contend on same bandwidth
