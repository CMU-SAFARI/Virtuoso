# Read/Write DRAM Configuration
# ==============================
# Fixed-latency DRAM model with separate read and write queues.
# No bank/rank contention or refresh, but models read/write bandwidth
# contention realistically. Good balance of speed and accuracy.

[perf_model/dram]
num_controllers = 1
type = readwrite
latency = 55
per_controller_bandwidth = 40     # GB/s (bandwidth limit still enforced)

[perf_model/dram/queue_model]
enabled = true
type = history_list

[perf_model/dram/readwrite]
shared = true                       # Reads and writes contend on same bandwidth
