# Read/Write DRAM — 2 controllers, 76.5 GB/s each
# ==================================================
# DDR5-4800 aggregate bandwidth (~153 GB/s) split across 2 controllers.
# Suitable for 4-core and 8-core configs.

[perf_model/dram]
num_controllers = 2
type = readwrite
latency = 55                        # DRAM access latency in ns
per_controller_bandwidth = 76.5     # GB/s per controller (153 / 2)

[perf_model/dram/queue_model]
enabled = true
type = history_list

[perf_model/dram/readwrite]
shared = true                       # Reads and writes contend on same bandwidth
