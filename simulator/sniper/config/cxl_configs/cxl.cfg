# CXL Memory Configuration for Sniper
#
# This configuration enables CXL.mem (Type 3) memory expansion simulation.
# Based on silicon-validated parameters from CXL-DMSim (arXiv:2411.02282).
#
# Usage: Include this file in your simulation config
#   include cxl.cfg
#
# Profiles:
#   cxl-asic.cfg  - CXL ASIC memory (low latency, ~2.2x local DDR)
#   cxl-fpga.cfg  - CXL FPGA memory (higher latency, ~2.9x local DDR)

#=============================================================================
# CXL Memory Performance Model
#=============================================================================
[perf_model/cxl]
# Enable CXL memory model
enabled = true

# CXL device type: asic or fpga
# ASIC has lower latency (~284ns total), FPGA has higher (~375ns total)
device_type = asic

#-----------------------------------------------------------------------------
# Latency Parameters (in nanoseconds)
# Total CXL overhead = bridge + host_protocol + device_protocol + link
#-----------------------------------------------------------------------------

# PCIe/CXL bridge traversal latency
# Validated: ~50ns on real hardware
bridge_latency = 50

# CXL.mem packet processing at host side
# Validated: ~12ns
host_protocol_latency = 12

# CXL controller processing at device
# ASIC: ~15ns, FPGA: ~60ns (silicon validated)
device_protocol_latency = 15

# PCIe link propagation delay
# Varies with cable length: 5-20ns
link_latency = 10

# Backend DRAM latency (memory inside CXL device)
# DDR5: ~100ns, DDR4: ~120ns
backend_dram_latency = 100

#-----------------------------------------------------------------------------
# Backend DRAM Organization
#-----------------------------------------------------------------------------

# Number of banks per rank
num_banks = 16

# Number of bank groups
num_bank_groups = 4

# Number of ranks
num_ranks = 2

# Number of channels
num_channels = 1

# Row buffer (page) size in bytes
page_size = 8192

#-----------------------------------------------------------------------------
# Row Buffer Timing (in nanoseconds)
#-----------------------------------------------------------------------------

# Time to keep row buffer open before auto-close
bank_keep_open = 15000

# Row activation delay (tRCD)
bank_open_delay = 15

# Row precharge delay (tRP)
bank_close_delay = 15

# Column access strobe delay (tCAS)
dram_access_cost = 15

#-----------------------------------------------------------------------------
# CXL Link Parameters
#-----------------------------------------------------------------------------

# CXL link bandwidth in GB/s
# PCIe 5.0 x16: 32 GB/s per direction (64 GB/s bidirectional)
# PCIe 4.0 x16: 16 GB/s per direction
link_bandwidth = 32.0

# Request FIFO depth (credits for flow control)
link_request_fifo_depth = 128

# Response FIFO depth
link_response_fifo_depth = 128

# Device-side request queue depth
device_request_fifo_depth = 48

# Device-side response queue depth
device_response_fifo_depth = 48

#-----------------------------------------------------------------------------
# Queue Model
#-----------------------------------------------------------------------------
[perf_model/cxl/queue_model]
type = contention

#=============================================================================
# Memory Tiering Configuration
#=============================================================================
[perf_model/cxl/tiering]
# Enable memory tiering between local DRAM and CXL
enabled = true

# Placement policy:
#   address_range - Static address-based partitioning
#   first_touch   - First-touch allocation with capacity limits (NUMA-like)
#   hot_cold      - Dynamic hot/cold page migration
#   interleave    - Round-robin interleaving across tiers
#   all_local     - Everything in local DRAM (baseline)
#   all_cxl       - Everything in CXL (stress test)
policy = address_range

# Local DRAM capacity in GB
local_dram_capacity_gb = 16

# CXL memory capacity in GB
cxl_capacity_gb = 64

# Address threshold for CXL (addresses >= this go to CXL)
# Default: 16TB (0x100000000000)
cxl_address_start = 0x100000000000

#-----------------------------------------------------------------------------
# Hot/Cold Migration Parameters (for hot_cold policy)
#-----------------------------------------------------------------------------

# Access count threshold to consider a page "hot"
hot_threshold = 1000

# Access count threshold to consider a page "cold"
cold_threshold = 10

#-----------------------------------------------------------------------------
# Interleave Parameters (for interleave policy)
#-----------------------------------------------------------------------------

# Number of pages to allocate before switching tier
interleave_granularity = 1
