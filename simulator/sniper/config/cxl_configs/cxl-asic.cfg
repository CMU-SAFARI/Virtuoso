# CXL ASIC Memory Profile
#
# Silicon-validated parameters for CXL ASIC memory expander
# Based on CXL-DMSim measurements (arXiv:2411.02282):
#   - Total latency: ~284ns (2.18x local DDR)
#   - Bandwidth: 82-83% of local DDR
#   - Backend: DDR5 4800 MT/s
#
# Usage: include cxl-asic.cfg

include cxl.cfg

[perf_model/cxl]
device_type = asic

# CXL ASIC has optimized controller
device_protocol_latency = 15

# DDR5 backend
backend_dram_latency = 100
num_channels = 2

# ASIC achieves good bandwidth
link_bandwidth = 32.0

# Optimized queue depths
device_request_fifo_depth = 48
device_response_fifo_depth = 48
