# CXL Tiered Memory Configuration
# 
# This configuration enables heterogeneous memory with:
#   - Tier 0: Local DDR5 (16 GB, ~100ns)
#   - Tier 1: CXL-ASIC attached memory (64 GB, ~284ns)
#
# Based on silicon-validated parameters from CXL-DMSim (arXiv:2411.02282)
#
# Usage:
#   ./run-sniper -c gainestown -c cxl-tiered -- ./your_benchmark

#==============================================================================
# Enable CXL / Tiered Memory Controller
#==============================================================================
[perf_model/cxl]
enabled = true

#==============================================================================
# Tier Configuration
#==============================================================================
[perf_model/dram/tiers]
num_tiers = 2

[perf_model/dram/tiering]
enabled = true

#------------------------------------------------------------------------------
# Tier 0: Local DDR5 Memory (Fast, Limited Capacity)
#------------------------------------------------------------------------------
[perf_model/dram/tier0]
type = ddr
capacity_gb = 16
topology = local

#------------------------------------------------------------------------------
# Tier 1: CXL-Attached Memory (Slower, Larger Capacity)
#------------------------------------------------------------------------------
[perf_model/dram/tier1]
type = cxl
capacity_gb = 64
topology = near

#==============================================================================
# CXL Performance Model Parameters (Silicon-Validated)
#==============================================================================
[perf_model/cxl]
# CXL protocol latencies (from CXL-DMSim ASIC validation)
bridge_latency = 50              # PCIe/CXL bridge traversal (ns)
host_protocol_latency = 12       # CXL.mem packet processing at host (ns)
device_protocol_latency = 15     # CXL controller at device - ASIC (ns)
link_latency = 10                # PCIe link propagation (ns)

# Backend DRAM in CXL device
backend_dram_latency = 100       # DDR5 inside CXL device (ns)

# CXL link bandwidth (PCIe 5.0 x16)
link_bandwidth = 32.0            # GB/s per direction

# Bank configuration for backend DRAM
num_banks = 16
num_bank_groups = 4
num_ranks = 2
num_channels = 2

# Row buffer timing
bank_keep_open = 15000           # Row buffer open time (ns)
bank_open_delay = 15             # tRCD (ns)
bank_close_delay = 15            # tRP (ns)
dram_access_cost = 15            # tCAS (ns)
page_size = 8192                 # Row buffer size (bytes)

# Queue model
[perf_model/cxl/queue_model]
type = contention

#==============================================================================
# CXL Tiering Policy
#==============================================================================
[perf_model/cxl/tiering]
enabled = true
policy = address_range           # Options: address_range, first_touch, hot_cold, interleave

# Capacity limits for first_touch policy
local_dram_capacity_gb = 16
cxl_capacity_gb = 64

# Hot/cold thresholds for hot_cold policy
hot_threshold = 1000             # Accesses to consider page "hot"
cold_threshold = 10              # Accesses to consider page "cold"

# Interleave granularity (pages)
interleave_granularity = 1
