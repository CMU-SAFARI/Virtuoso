# CXL 3-Tier Heterogeneous Memory Configuration
# 
# This configuration enables a 3-tier memory hierarchy:
#   - Tier 0: Local DDR5 (16 GB, ~100ns) - hot data
#   - Tier 1: CXL-ASIC direct-attached (64 GB, ~284ns) - warm data
#   - Tier 2: CXL-ASIC switch-attached (256 GB, ~350ns) - cold data
#
# Topology:
#   CPU --- DDR5 (Tier 0)
#    |
#    +--- CXL Device (Tier 1, direct-attached)
#    |
#    +--- CXL Switch --- CXL Pooled Memory (Tier 2)
#
# Usage:
#   ./run-sniper -c gainestown -c cxl-3tier -- ./your_benchmark

#==============================================================================
# Enable CXL / Tiered Memory Controller
#==============================================================================
[perf_model/cxl]
enabled = true

#==============================================================================
# Tier Configuration
#==============================================================================
[perf_model/dram/tiers]
num_tiers = 3

[perf_model/dram/tiering]
enabled = true

#------------------------------------------------------------------------------
# Tier 0: Local DDR5 Memory
#------------------------------------------------------------------------------
[perf_model/dram/tier0]
type = ddr
capacity_gb = 16
topology = local

#------------------------------------------------------------------------------
# Tier 1: CXL Direct-Attached (CXL_NEAR)
#------------------------------------------------------------------------------
[perf_model/dram/tier1]
type = cxl
capacity_gb = 64
topology = near

#------------------------------------------------------------------------------
# Tier 2: CXL Switch-Attached (CXL_FAR)
#------------------------------------------------------------------------------
[perf_model/dram/tier2]
type = cxl
capacity_gb = 256
topology = far

#==============================================================================
# CXL Performance Model - Tier 1 (Direct-Attached)
#==============================================================================
[perf_model/cxl]
bridge_latency = 50
host_protocol_latency = 12
device_protocol_latency = 15     # ASIC
link_latency = 10
backend_dram_latency = 100
link_bandwidth = 32.0

num_banks = 16
num_bank_groups = 4
num_ranks = 2
num_channels = 2

#==============================================================================
# Note: For Tier 2 (switch-attached), add ~50-100ns additional latency
# This is modeled by the CXL_FAR topology which adds switch traversal overhead
# In a more detailed model, you could create separate CXL perf models per tier
#==============================================================================

#==============================================================================
# CXL Tiering Policy
#==============================================================================
[perf_model/cxl/tiering]
enabled = true
policy = hot_cold                # Use hot/cold page migration

local_dram_capacity_gb = 16
cxl_capacity_gb = 320            # 64 + 256 GB total CXL

hot_threshold = 500              # Promote to Tier 0 after 500 accesses
cold_threshold = 5               # Demote after 5 accesses in interval
