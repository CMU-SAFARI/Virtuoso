# CXL FPGA Memory Profile
#
# Silicon-validated parameters for CXL FPGA memory expander
# Based on CXL-DMSim measurements (arXiv:2411.02282):
#   - Total latency: ~375ns (2.88x local DDR)
#   - Bandwidth: 45-69% of local DDR
#   - Backend: DDR4 3200 MT/s
#
# Usage: include cxl-fpga.cfg

include cxl.cfg

[perf_model/cxl]
device_type = fpga

# FPGA has higher controller latency due to lower clock frequency
device_protocol_latency = 60

# DDR4 backend (slower than DDR5)
backend_dram_latency = 120
num_channels = 1

# FPGA achieves lower bandwidth
link_bandwidth = 20.0

# More conservative queue depths
device_request_fifo_depth = 36
device_response_fifo_depth = 36
