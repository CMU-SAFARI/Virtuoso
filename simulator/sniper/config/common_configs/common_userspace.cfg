# Base System Configuration — Userspace MimicOS Mode
# ===================================================
# Same as base_system_sniperspace but with userspace MimicOS enabled.
# In this mode, page faults are handled by the userspace VirtuOS process
# via message passing (context switch overhead modeled).

[general]
total_cores = 1
native_environment = "true"
virtualized_environment = "false"
translation_enabled = "true"
enable_icache_modeling = false
enable_userspace_mimicos = true
exception_handler_type = "default"

[perf_model/mimicos_host]
enabled = "false"
page_fault_latency = 0

[perf_model/dram/numa]
enabled = false

[perf_model/mmu]
sanity_checks_enabled = true

[scheduler]
type = static
