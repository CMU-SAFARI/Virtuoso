# Base System Configuration
# =========================
# This file contains only the simulation basics.
# Core/cache settings are in core_configs/.
#
# Usage: Include this first, then a core_config, then scheme-specific configs.

[general]
total_cores = 1
native_environment = "true"
virtualized_environment = "false"
translation_enabled = "true"
enable_icache_modeling = false
enable_userspace_mimicos = false
exception_handler_type = "default"
# ---- Default disabled features ----

[perf_model/mimicos_host]
enabled = "false"
page_fault_latency = 0


[perf_model/dram/numa]
enabled = false

[perf_model/mmu]
sanity_checks_enabled = true

[scheduler]
type = static
