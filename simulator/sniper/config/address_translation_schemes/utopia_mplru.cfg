# Utopia Configuration with MPLRU (Metadata-Priority LRU)
# =========================================================
# Full Utopia address translation scheme with MPLRU-enabled NUCA cache:
#   - 4-level allocation hierarchy: RestSeg-2MB → FlexSeg-THP → RestSeg-4KB → FlexSeg-4KB
#   - Range-based translation for RestSeg (no page table walks)
#   - Conventional page tables for FlexSeg
#   - Utopia-aware exception handler (skips PT updates for RestSeg)
#   - MPLRU replacement policy that prioritizes translation metadata in NUCA
#
# MPLRU 6-Level Policy:
#   L0: OFF (vanilla LRU)
#   L1: Gentle bias 25% (evict data if in bottom 25% LRU)
#   L2: Medium bias 50% (evict data if in bottom 50% LRU)
#   L3: Hard bias (always evict data first)
#   L4: Partition 25% (reserve 25% ways for metadata)
#   L5: Partition 50% (reserve 50% ways for metadata)
#
# Controller Types:
#   - "delta": Δ-based push-then-backoff policy (this config)
#   - "bandit": IPC-only multi-armed bandit (see utopia_mplru_bandit.cfg)

# Base system (simulation basics)
#include ./common_configs/base_system_sniperspace.cfg

# Core and cache configuration
#include ./core_configs/meteor_lake_pcore.cfg

# MMU configuration (Utopia with RestSeg/FlexSeg support)
#include ./mmu_configs/mmu_utopia.cfg

# Page table configuration (for FlexSeg)
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg

# DRAM configuration
#include ./dram_configs/ddr4_2400_4channel.cfg

# Physical memory allocator (Utopia with 4-level hierarchy)
#include ./physical_memory_allocators/utopia.cfg


# ============================================================
# MPLRU Configuration
# ============================================================
[perf_model/nuca]
replacement_policy = mplru

[perf_model/nuca/cache/mplru]
mode = adaptive         # always | adaptive | disabled
mpki_threshold = 10.0   # TLB MPKI threshold (fallback heuristic)

# ============================================================
# MPLRU Delta Controller Configuration
# ============================================================
# Δ-based push-then-backoff controller that optimizes translation
# stalls without causing excessive data pain.
[perf_model/nuca/cache/mplru/controller]
type = delta
enabled = true
epoch_instructions = 50000

# Engage Gate: when to start protecting metadata
tr_share_min = 0.01             # Min translation share to engage (1%)
rho_min = 0.02                  # Min rho (tr/data ratio) to engage
engage_threshold_epochs = 2     # Epochs above threshold to engage
disengage_threshold_epochs = 4  # Epochs below threshold to disengage

# Level Control
meta_level_start = 2            # Starting level (0-5)
meta_level_max = 5              # Maximum level (0-5)
cooldown_epochs = 2             # Wait between level changes
max_step_per_epoch = 1          # Max level change per epoch

# Delta Decision Thresholds
data_pain_frac = 0.05           # Back off if data pain rises by 5%
tr_gain_frac = 0.03             # Advance if translation gain > 3%
ema_alpha = 0.2                 # EMA smoothing factor

# Exploration Phase (after engage)
explore_epochs = 3              # Push aggressively for N epochs
severe_data_pain_mult = 2.0     # Severe pain = data_pain_frac * this

# Absolute Guardrail (prevent data starvation)
abs_guard_enabled = true
data_share_max = 0.995          # Max data share before forced backoff
abs_guard_epochs = 2            # Consecutive epochs to trigger
abs_guard_backoff_step = 2      # Levels to back off

# Net Benefit Test
net_benefit_enabled = true
harm_to_benefit_ratio = 1.5     # Max acceptable harm/benefit ratio
min_benefit_cycles = 1000       # Ignore tiny benefits

# Level-Aware Guardrails (stricter at high levels)
level_aware_guard = true
high_level_threshold = 4        # Level above which stricter rules apply
high_level_ratio_mult = 0.75    # Tighter harm/benefit at high levels
