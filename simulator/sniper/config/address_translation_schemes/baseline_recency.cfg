# Baseline + Recency TLB Prefetcher
# ====================================
# Standard 4-level radix page table with 4KB pages, ReserveTHP allocator,
# and the Recency-based TLB Prefetcher enabled.
#
# The recency prefetcher maintains a doubly-linked list of evicted
# translations and predicts same-recency, recency-1, and recency+1
# neighbors.  Pointer-chase latency is modeled through the cache
# hierarchy via a separate per-app radix pointer table.
#
# See config/mmu_configs/mmu_recency.cfg for all prefetcher knobs.

# Base system (simulation basics)
#include ./common_configs/base_system_sniperspace.cfg

# Core and cache configuration
#include ./core_configs/meteor_lake_pcore.cfg

# MMU configuration (with Recency TLB Prefetcher)
#include ./mmu_configs/mmu_recency.cfg

# Page table configuration
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg

# DRAM configuration
#include ./dram_configs/ddr4_2400_4channel.cfg

# Physical memory allocator
#include ./physical_memory_allocators/reserve_thp.cfg
