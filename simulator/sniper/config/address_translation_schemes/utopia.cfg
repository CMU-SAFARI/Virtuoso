# Utopia Configuration
# =====================
# Full Utopia address translation scheme with:
#   - 4-level allocation hierarchy: RestSeg-2MB вҶ’ FlexSeg-THP вҶ’ RestSeg-4KB вҶ’ FlexSeg-4KB
#   - Range-based translation for RestSeg (no page table walks)
#   - Conventional page tables for FlexSeg
#   - Utopia-aware exception handler (skips PT updates for RestSeg)
#
# Architecture Overview:
