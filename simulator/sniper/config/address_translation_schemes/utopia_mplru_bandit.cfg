# Utopia Configuration with MPLRU Bandit Controller
# ==================================================
# Uses NUCA MPKI-based multi-armed bandit for MPLRU level selection.
# Inherits from utopia_mplru.cfg and overrides controller type.
#
# 12-Arm Bandit Algorithm:
#   - Arms 0-5 (M0-M5): Metadata protection (evict data preferentially)
#   - Arms 6-11 (D0-D5): Data protection (evict metadata preferentially)
#   - Reward = -MPKI (negative, to minimize NUCA misses)
#   - Q-values updated with EMA: Q = beta*reward + (1-beta)*Q
#   - UCB-based exploration (bonus for under-sampled arms)
#   - Warmup phase: cycles through all arms to initialize Q-values

# Base Utopia+MPLRU configuration (inherits delta controller settings)
#include ./address_translation_schemes/utopia_mplru.cfg

# ============================================================
# Override: Use 12-Arm MPKI-Based Bandit Controller
# ============================================================
[perf_model/nuca/cache/mplru/controller]
type = bandit

# Learning parameters
beta = 0.2              # EMA smoothing: Q = beta*reward + (1-beta)*Q

# Starting point (M2 = mid-level metadata protection)
start_level = 2         # Start at M2 (middle metadata level)

# Warmup phase: cycle through all 12 levels before exploitation
warmup_epochs = 120     # 120 epochs total = 10 epochs per arm (12 arms)

# UCB exploration
use_ucb = true          # Use UCB for arm selection
ucb_c = 1.0             # UCB exploration coefficient

# Probe settings (longer probes for stable MPKI measurements)
probe_period = 20       # Epochs between probes
probe_length = 5        # Epochs per probe (longer = more stable)

# Force policy override (set to true to lock to a specific arm)
force_policy = false    # Set true to force a fixed policy
forced_policy_id = 2    # Policy ID to force (0-11) when force_policy=true
