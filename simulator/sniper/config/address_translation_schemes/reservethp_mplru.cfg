# ReserveTHP with MPLRU Configuration
# =====================================
# Reservation-based THP allocator with radix page table
# and MPLRU-enabled NUCA cache for metadata priority.
#
# MPLRU 6-Level Policy:
#   L0: OFF (vanilla LRU)
#   L1: Gentle bias 25% (evict data if in bottom 25% LRU)
#   L2: Medium bias 50% (evict data if in bottom 50% LRU)
#   L3: Hard bias (always evict data first)
#   L4: Partition 25% (reserve 25% ways for metadata)
#   L5: Partition 50% (reserve 50% ways for metadata)
#
# Controller Types:
#   - "delta": Δ-based push-then-backoff policy (this config)
#   - "bandit": IPC-only multi-armed bandit (see reservethp_mplru_bandit.cfg)

# Base system (simulation basics)
#include ./common_configs/base_system_sniperspace.cfg

# Core and cache configuration
#include ./core_configs/meteor_lake_pcore.cfg

# MMU configuration (default MMU with MPLRU controller support)
#include ./mmu_configs/mmu_base.cfg

# Page table configuration
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg

# DRAM configuration
#include ./dram_configs/ddr4_2400_4channel.cfg

# Physical memory allocator
#include ./physical_memory_allocators/reserve_thp.cfg


# ============================================================
# MPLRU Configuration
# ============================================================
[perf_model/nuca]
replacement_policy = mplru

[perf_model/nuca/cache/mplru]
mode = adaptive         # always | adaptive | disabled
mpki_threshold = 10.0   # TLB MPKI threshold (fallback heuristic)

# ============================================================
# MPLRU Delta Controller Configuration
# ============================================================
[perf_model/nuca/cache/mplru/controller]
type = delta
enabled = true
epoch_instructions = 50000

# Engage Gate
tr_share_min = 0.01
rho_min = 0.02
engage_threshold_epochs = 2
disengage_threshold_epochs = 4

# Level Control
meta_level_start = 2
meta_level_max = 5              # Use 6-level policy (0-5)
cooldown_epochs = 2
max_step_per_epoch = 1

# Delta Decision Thresholds
data_pain_frac = 0.05
tr_gain_frac = 0.03
ema_alpha = 0.2

# Exploration Phase
explore_epochs = 3
severe_data_pain_mult = 2.0

# Absolute Guardrail
abs_guard_enabled = true
data_share_max = 0.995
abs_guard_epochs = 2
abs_guard_backoff_step = 2

# Net Benefit Test
net_benefit_enabled = true
harm_to_benefit_ratio = 1.5
min_benefit_cycles = 1000

# Level-Aware Guardrails
level_aware_guard = true
high_level_threshold = 4
high_level_ratio_mult = 0.75
