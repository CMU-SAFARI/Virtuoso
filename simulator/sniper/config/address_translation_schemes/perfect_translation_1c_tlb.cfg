# Perfect Translation with 1-Cycle TLB Latency
# ==============================================
# Same as perfect_translation.cfg but keeps the realistic 1-cycle L1 TLB 
# latency. This isolates the impact of TLB lookup overhead:
#   - Perfect (0-cycle) TLB gives the absolute upper bound
#   - This config (1-cycle TLB) shows cost of TLB lookup alone
#   - Baseline has 1-cycle L1 TLB + 12-cycle L2 TLB + page walks

# Base system (simulation basics)
#include ./common_configs/base_system_sniperspace.cfg

# Core and cache configuration
#include ./core_configs/meteor_lake_pcore.cfg

# MMU configuration - will override with zero walk latencies below
#include ./mmu_configs/mmu_base.cfg

# Page table configuration
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg

# DRAM configuration
#include ./dram_configs/ddr4_2400_4channel.cfg

# Physical memory allocator - uses reservethp for PA remapping
#include ./physical_memory_allocators/reserve_thp.cfg

# ---- Perfect Translation with 1-Cycle TLB Overrides ----
# Translation IS enabled (to get PA remapping benefits)
[general]
translation_enabled = true

# Enable perfect translation mode in MMU (zero walk latency, but still does VA->PA mapping)
[perf_model/mmu]
perfect_translation = true
count_page_fault_latency = "false"

[perf_model/mmu/tlb_level_1/tlb1]
access_latency = 1

# Zero latency page walk caches (walks are instant anyway in perfect mode)
[perf_model/mmu/pwc]
access_penalty = 0
miss_penalty = 0
