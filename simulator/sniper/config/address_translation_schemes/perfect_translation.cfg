# Perfect Translation Configuration
# ==================================
# Uses address translation with reservethp allocator (for PA remapping)
# but with ZERO translation latency (perfect TLB, instant PTW).
# This isolates the cache behavior benefit from reservethp's address remapping.

# Base system (simulation basics)
#include ./common_configs/base_system_sniperspace.cfg

# Core and cache configuration
#include ./core_configs/meteor_lake_pcore.cfg

# MMU configuration - will override with zero latencies below
#include ./mmu_configs/mmu_base.cfg

# Page table configuration
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg

# DRAM configuration
#include ./dram_configs/ddr4_2400_4channel.cfg

# Physical memory allocator - uses reservethp for PA remapping
#include ./physical_memory_allocators/reserve_thp.cfg

# ---- Perfect Translation Overrides ----
# Translation IS enabled (to get PA remapping benefits)
[general]
translation_enabled = true

# Enable perfect translation mode in MMU (zero latency, but still does VA->PA mapping)
[perf_model/mmu]
perfect_translation = true
count_page_fault_latency = "false"

# Zero latency TLBs (not used in perfect mode, but set anyway)
[perf_model/mmu/tlb_level_1/tlb1]
access_latency = 0

[perf_model/mmu/tlb_level_1/tlb2]
access_latency = 0

[perf_model/mmu/tlb_level_1/tlb3]
access_latency = 0

[perf_model/mmu/tlb_level_2/tlb1]
access_latency = 0

# Zero latency page walk caches
[perf_model/mmu/pwc]
access_penalty = 0
miss_penalty = 0
