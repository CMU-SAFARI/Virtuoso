# Fast Detailed — Baseline Translation
# =====================================
# Meteor Lake P-core style cache hierarchy using the fast_detailed
# memory manager (simplified tag-only caches, no coherence protocol).
# Full address translation enabled with 4-level radix page table.

# Base system (simulation basics)
#include ./common_configs/base_system_sniperspace.cfg

# Core and cache configuration (Meteor Lake P-core)
#include ./core_configs/meteor_lake_pcore.cfg

# MMU configuration
#include ./mmu_configs/mmu_base.cfg

# Page table configuration
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg

# DRAM configuration — readwrite model, 1 controller, 153 GB/s
#include ./dram_configs/readwrite_1ctrl_153gbps.cfg

# Physical memory allocator
#include ./physical_memory_allocators/reserve_thp.cfg

# ---- Override: use fast_detailed caching protocol ----
[caching_protocol]
type = fast_detailed

# ---- L3 cache parameters (fast_detailed reads these directly) ----
# Meteor Lake uses NUCA for LLC; fast_detailed needs explicit l3_cache knobs.
[perf_model/l3_cache]
cache_size = 4096            # 4MB LLC (4MB per core)
associativity = 16
data_access_time = 20        # ~20 cycles
shared_cores = 1             # Single-core config

# ---- Disable NUCA (fast_detailed has its own LLC) ----
[perf_model/nuca]
enabled = false
