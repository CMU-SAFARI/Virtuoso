# No Translation Configuration with XOR Hash
# ============================================
# Disables address translation - uses virtual addresses directly as physical.
# Uses XOR hash for NUCA cache to study cache conflict behavior.

# Base system (simulation basics)
#include ./common_configs/base_system_sniperspace.cfg

# Core and cache configuration
#include ./core_configs/meteor_lake_pcore.cfg

# MMU configuration (still needed for infrastructure)
#include ./mmu_configs/mmu_base.cfg

# Page table configuration
#include ./pagetable_configs/4_level_radix.cfg
#include ./pagetable_configs/range_table.cfg

# DRAM configuration
#include ./dram_configs/ddr4_2400.cfg

# Physical memory allocator (not used but needed for config)
#include ./physical_memory_allocators/reserve_thp.cfg

# ---- Disable translation ----
[general]
translation_enabled = false

# ---- Override NUCA hash to use XOR ----
[perf_model/nuca]
address_hash = xor_mod
