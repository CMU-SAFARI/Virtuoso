# Fast Detailed — Baseline Translation (16-core)
# ===============================================
# Same as fast_detailed_baseline.cfg but configured for 16 cores
# with a shared 64MB L3 cache (4MB per core).

#include address_translation_schemes/fast_detailed_baseline.cfg

[general]
total_cores = 16

# DRAM: 4 controllers, 76.5 GB/s each (306 GB/s total)
[perf_model/dram]
num_controllers = 4
per_controller_bandwidth = 76.5

[perf_model/l3_cache]
shared_cores = 16
cache_size = 65536           # 64MB shared LLC (4MB per core)
