# Fast Detailed — Baseline Translation (2-core)
# ===============================================
# Same as fast_detailed_baseline.cfg but configured for 2 cores
# with a shared 8MB L3 cache (4MB per core).

#include address_translation_schemes/fast_detailed_baseline.cfg

[general]
total_cores = 2

[perf_model/l3_cache]
shared_cores = 2
cache_size = 8192            # 8MB shared LLC (4MB per core)
