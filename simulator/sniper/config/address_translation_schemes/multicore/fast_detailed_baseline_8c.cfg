# Fast Detailed — Baseline Translation (8-core)
# ===============================================
# Same as fast_detailed_baseline.cfg but configured for 8 cores
# with a shared 32MB L3 cache (4MB per core).

#include address_translation_schemes/fast_detailed_baseline.cfg

[general]
total_cores = 8

# DRAM: 2 controllers, 76.5 GB/s each (153 GB/s total)
[perf_model/dram]
num_controllers = 2
per_controller_bandwidth = 76.5

[perf_model/l3_cache]
shared_cores = 8
cache_size = 32768           # 32MB shared LLC (4MB per core)
