# Fast Detailed — Baseline Translation (4-core)
# ===============================================
# Same as fast_detailed_baseline.cfg but configured for 4 cores
# with a shared 16MB L3 cache (4MB per core).

#include address_translation_schemes/fast_detailed_baseline.cfg

[general]
total_cores = 4

# DRAM: 2 controllers, 76.5 GB/s each (153 GB/s total)
[perf_model/dram]
num_controllers = 2
per_controller_bandwidth = 76.5

[perf_model/l3_cache]
shared_cores = 4
cache_size = 16384           # 16MB shared LLC (4MB per core)
