# Fast Detailed — NUMA 4-node (16 cores: 4 per node)
# ====================================================
# 4 NUMA nodes, each with 4 cores and its own DDR5 memory (153 GB/s per node).
# Total: 16 cores, 612 GB/s aggregate DRAM bandwidth.
#
# Architecture:
#   Node 0: cores 0-3,   32 GB DDR5, 2 controllers × 76.5 GB/s
#   Node 1: cores 4-7,   32 GB DDR5, 2 controllers × 76.5 GB/s
#   Node 2: cores 8-11,  32 GB DDR5, 2 controllers × 76.5 GB/s
#   Node 3: cores 12-15, 32 GB DDR5, 2 controllers × 76.5 GB/s
#   Remote access penalty: +40 ns

#include address_translation_schemes/fast_detailed_baseline.cfg

[general]
total_cores = 16

# ---- Enable TieredDramCntlr via NUMA (no CXL dependency) ----
# NUMA activation is handled by perf_model/dram/numa/enabled below.
# No need for perf_model/cxl/enabled.

# ---- Tier configuration (single tier, DDR5 only) ----
[perf_model/dram/tiering]
enabled = false

[perf_model/dram/tiers]
num_tiers = 1

[perf_model/dram/tier0]
type = readwrite
capacity_gb = 128

# ---- DRAM base config (used by tier 0 / parent DramCntlr) ----
[perf_model/dram]
num_controllers = 8
type = readwrite
latency = 55
per_controller_bandwidth = 76.5

[perf_model/dram/queue_model]
enabled = true
type = history_list

[perf_model/dram/readwrite]
shared = true

# ---- NUMA topology ----
[perf_model/dram/numa]
enabled = true
num_nodes = 4
remote_latency_ns = 40
cores_per_node = 4
policy = local

[perf_model/dram/numa/node0]
capacity_gb = 32
kernel_reserved_gb = 8
type = readwrite
tier_id = 0

[perf_model/dram/numa/node1]
capacity_gb = 32
kernel_reserved_gb = 8
type = readwrite
tier_id = 0

[perf_model/dram/numa/node2]
capacity_gb = 32
kernel_reserved_gb = 8
type = readwrite
tier_id = 0

[perf_model/dram/numa/node3]
capacity_gb = 32
kernel_reserved_gb = 8
type = readwrite
tier_id = 0

# ---- NUMA memory allocator ----
[perf_model/mimicos_host]
page_table_type = "radix"
page_table_name = "radix_4level"
memory_allocator_type = "numa_reserve_thp"
memory_allocator_name = "numa_reserve_thp"
page_fault_handler = "default"
number_of_page_sizes = 2
page_size_list = 12, 21
swap_enabled = false

[perf_model/numa_reserve_thp]
memory_size = 131072
target_fragmentation = 0.0
kernel_size = 32768
max_order = 12
frag_type = "largepage"
threshold_for_promotion = 0.0
fragmentation_mode = "ratio"
target_free_2mb_pages = 0
num_numa_nodes = 4
numa_policy = "local"
utilization_threshold = 0.85
per_node_capacity_mb = 32768,32768,32768,32768
per_node_kernel_mb = 8192,8192,8192,8192

# ---- L3: 64MB shared across all 16 cores (4MB per core) ----
[perf_model/l3_cache]
shared_cores = 16
cache_size = 65536
